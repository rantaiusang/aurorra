<html lang="id">
<head>
    <meta charset="UTF-8">

    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- SDK SUPABASE -->

    <style>
        /* --- VARIABLES --- */
        :root {
            --luxury-gold: #d4af37;
            --luxury-gold-light: #f3e5ab;
            --dark-bg: #0f0c15;
            --dark-card: #161216;
            --text-gray: #a0a0a0;
            --text-white: #ffffff;
        }

        /* --- RESET & BODY --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background: rgba(15, 12, 21, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            z-index: 100;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-white);
            text-decoration: none;
            letter-spacing: 1px;
            text-shadow: 0 0 10px 1px rgba(212, 175, 55, 0.3);
            transition: 0.3s;
        }
        .logo:hover { color: var(--luxury-gold); }

        /* --- CONTAINER --- */
        .page-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 20px 80px;
            width: 100%;
            box-sizing: border-box;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 30px;
            transition: color 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .back-link.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease, color 0.3s;
        }
        .back-link:hover { color: var(--luxury-gold); }

        /* --- MAIN CONTENT CARD --- */
        .content-container {
            background: var(--dark-card);
            padding: 50px;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* --- PAGE HEADER --- */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 30px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(to right, #fff, var(--luxury-gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        /* --- SOCIAL GRID --- */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Kolom */
            gap: 25px;
        }

        /* --- SOCIAL CARD STYLE --- */
        .social-card {
            background: linear-gradient(145deg, rgba(30, 25, 40, 0.6), rgba(15, 12, 21, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        /* Efek Garis Atas Warna Brand */
        .social-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--brand-color);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .social-card:hover::before {
            transform: scaleX(1);
        }

        /* Icon Container */
        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .social-card:hover .icon-box {
            background: rgba(255,255,255,0.1);
        }

        .icon-box svg {
            width: 28px;
            height: 28px;
            fill: var(--text-gray);
            transition: fill 0.3s;
        }

        /* Warna Icon Saat Hover */
        .social-card.instagram:hover .icon-box svg { fill: #c13584; }
        .social-card.tiktok:hover .icon-box svg { fill: #00f2ea; }
        .social-card.youtube:hover .icon-box svg { fill: #ff0000; }
        .social-card.google:hover .icon-box svg { fill: #4285f4; }

        /* Text Content */
        .card-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--text-white);
            margin-bottom: 5px;
            transition: color 0.3s;
        }

        .social-card:hover .card-content h3 {
            color: var(--luxury-gold-light);
        }

        .card-content span {
            font-size: 0.9rem;
            color: var(--text-gray);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Arrow Indicator */
        .arrow-indicator {
            position: absolute;
            right: 25px;
            color: var(--text-gray);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .social-card:hover .arrow-indicator {
            opacity: 1;
            transform: translateX(0);
            color: var(--luxury-gold);
        }

        /* --- FOOTER --- */
        .mini-footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
        }

        /* --- FADE ANIMATION --- */
        .fade-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .social-grid {
                grid-template-columns: 1fr; /* 1 Kolom di mobile */
            }
            
            .page-header h1 { font-size: 2rem; }
            .content-container { padding: 30px 20px; }
            .social-card { padding: 25px 20px; }
            .arrow-indicator { display: none; } /* Sembunyikan panah di mobile */
        }
    </style>
</head>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- TRACKER ANALYTICS ---
        async function trackPageView() {
            try {
                await sb.from('page_views').insert([{
                    page_url: window.location.pathname,
                    user_agent: navigator.userAgent
                }]);
            } catch (error) {
                console.error("Analytics Error:", error.message);
            }
        }

        // --- INISIALISASI ---
        window.onload = function() {
            window.scrollTo(0, 0);
            initScrollAnimations();
            trackPageView();
        };

        // --- OBSERVER ANIMASI ---
        function initScrollAnimations() {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            const fadeElements = document.querySelectorAll('.fade-on-scroll');
            fadeElements.forEach(el => observer.observe(el));
        }
    </script>

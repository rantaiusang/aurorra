<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan Akun Pi...</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f0c15;
            color: #d4af37;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div>
        <div class="spinner"></div>
        <p>Menghubungkan ke Pi Network...</p>
    </div>

    <script>
        // DEBUG: lihat URL penuh
        console.log("FULL URL:", window.location.href);
        console.log("HASH:", window.location.hash);

        // Ambil hash dengan cara yang benar
        const hash = window.location.hash.substring(1); // buang "#"
        const params = new URLSearchParams(hash);

        const accessToken = params.get("access_token");

        if (accessToken) {
            // Simpan token
            localStorage.setItem("pi_token", accessToken);

            console.log("✅ Pi Login Success");
            console.log("TOKEN:", accessToken);

            // Redirect ke store
            window.location.href = "store.html";

        } else {
            console.log("❌ Token tidak ditemukan");

            // Delay kecil biar user lihat error
            setTimeout(() => {
                alert("Login Pi gagal atau token tidak ditemukan.");

                // fallback ke login
                window.location.href = "login.html";
            }, 800);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan Akun Pi...</title>

    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f0c15;
            color: #d4af37;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 360px; width: 100%; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.15);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .sub-text {
            font-size: 0.8rem;
            color: #9ca3af;
            line-height: 1.5;
        }

        .error-box {
            display: none;
            margin-top: 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 15px;
            color: #fca5a5;
            font-size: 0.8rem;
        }

        .btn-retry {
            display: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-retry:hover {
            background: #d4af37;
            color: #000;
            border-color: #d4af37;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="spinner" id="spinner"></div>
        <div class="status-text" id="status-text">Menghubungkan ke Pi Network...</div>
        <div class="sub-text" id="sub-text">Mohon tunggu sebentar</div>
        <div class="error-box" id="error-box"></div>
        <button class="btn-retry" id="btn-retry" onclick="window.location.href='login.html'">Kembali ke Login</button>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE (SAMA DENGAN LOGIN.HTML) ---
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        const uiStatus = document.getElementById('status-text');
        const uiSub = document.getElementById('sub-text');
        const uiSpinner = document.getElementById('spinner');
        const uiError = document.getElementById('error-box');
        const uiRetry = document.getElementById('btn-retry');

        function showError(msg) {
            uiSpinner.style.display = 'none';
            uiStatus.innerText = 'Gagal';
            uiStatus.style.color = '#ef4444';
            uiSub.style.display = 'none';
            uiError.style.display = 'block';
            uiError.innerText = msg;
            uiRetry.style.display = 'inline-block';
        }

        // ============================================================
        //  FLOW UTAMA
        // ============================================================
        async function handleCallback() {
            // 1. Ambil token dari URL hash
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                showError('Token tidak ditemukan di URL. Pastikan login dari halaman yang benar.');
                console.error('❌ Tidak ada access_token di hash:', hash);
                return;
            }

            console.log('✅ Token ditemukan, memverifikasi ke Pi API...');

            // 2. Verifikasi token ke Pi API -> ambil data user
            let piUser;
            try {
                uiStatus.innerText = 'Memverifikasi akun Pi...';

                const res = await fetch('https://api.minepi.com/v2/me', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    }
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error('Pi API error ' + res.status + ': ' + errText);
                }

                piUser = await res.json();
                console.log('✅ Pi user data:', piUser);

            } catch (err) {
                console.error('❌ Gagal verifikasi ke Pi API:', err);
                showError('Gagal memverifikasi ke Pi Network: ' + err.message);
                return;
            }

            // 3. Cek user di Supabase
            const piUid = piUser.uid;
            const piUsername = piUser.username || 'pi_user';

            if (!piUid) {
                showError('Data Pi tidak lengkap (uid kosong).');
                return;
            }

            try {
                uiStatus.innerText = 'Mencari akun...';

                const { data: existingUser, error: findError } = await sb
                    .from('ngebelusers')
                    .select('*')
                    .eq('pi_uid', piUid)
                    .maybeSingle();

                if (findError) throw findError;

                if (existingUser) {
                    // === USER SUDAH ADA ===
                    console.log('✅ User ditemukan di database:', existingUser);

                    localStorage.setItem('aurora_user', JSON.stringify({
                        id: existingUser.id,
                        email: existingUser.email || piUsername + '@pi.network',
                        pi_username: piUsername,
                        pi_uid: piUid
                    }));
                    localStorage.setItem('aurora_role', existingUser.role || 'user');
                    localStorage.setItem('pi_token', accessToken);

                    uiStatus.innerText = 'Berhasil!';
                    uiStatus.style.color = '#10b981';
                    uiSub.innerText = 'Mengalihkan ke toko...';

                    setTimeout(() => {
                        if (existingUser.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'store.html';
                        }
                    }, 1000);

                } else {
                    // === USER BARU ===
                    console.log('ℹ️ User baru, mengarahkan ke signup...');

                    // Simpan data Pi sementara untuk dipakai di signup.html
                    localStorage.setItem('pi_token', accessToken);
                    localStorage.setItem('pi_signup_data', JSON.stringify({
                        uid: piUid,
                        username: piUsername
                    }));

                    uiStatus.innerText = 'Akun Baru';
                    uiSub.innerText = 'Mengarahkan ke pendaftaran...';

                    setTimeout(() => {
                        window.location.href = 'signup.html';
                    }, 1200);
                }

            } catch (err) {
                console.error('❌ Error database:', err);
                showError('Gagal mengakses database: ' + err.message);
            }
        }

        // --- JALANKAN ---
        handleCallback();
    </script>

</body>
</html>

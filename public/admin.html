<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurorra Admin Panel</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- VARIABLE & RESET --- */
        :root {
            --luxury-gold: #d4af37;
            --luxury-gold-light: #f3e5ab;
            --dark-bg: #0f0c15;
            --panel-bg: #161216;
            --card-bg: #1a1620;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            display: flex;
            overflow-x: hidden;
        }

        /* --- SECURITY OVERLAY --- */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--dark-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        #auth-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--luxury-gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--panel-bg);
            border-right: 1px solid rgba(212, 175, 55, 0.1);
            position: fixed; left: 0; top: 0;
            display: flex; flex-direction: column;
            padding: 20px 15px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--luxury-gold);
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .nav-menu { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--luxury-gold);
        }
        .nav-link.active { border-left: 3px solid var(--luxury-gold); }

        .user-info { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px; }
        .user-avatar { width: 100%; display: flex; align-items: center; gap: 10px; }
        .avatar-circle { width: 35px; height: 35px; background: var(--luxury-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 0.8rem; }
        
        /* Tombol Logout Styling */
        .logout-btn { 
            width: 100%; 
            margin-top: 10px; 
            padding: 10px; 
            background: rgba(231, 76, 60, 0.1); 
            border: 1px solid rgba(231, 76, 60, 0.3); 
            color: var(--danger); 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.2s; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
        }
        .logout-btn:hover { background: var(--danger); color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 25px;
            width: 100%;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
        
        /* Mobile Toggle */
        .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--luxury-gold); }
        .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }

        /* --- COMPONENTS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: rgba(212, 175, 55, 0.05); border-radius: 0 0 0 100%; }
        .stat-label { font-size: 0.85rem; color: var(--text-gray); margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 600; color: var(--text-white); }

        /* --- CARD SECTION --- */
        .card-section {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            margin-bottom: 30px;
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .section-title { font-family: 'Playfair Display', font-size: 1.2rem; color: var(--luxury-gold); }

        /* --- TABLE --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px 10px; color: var(--text-gray); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Badges & Buttons */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(46, 204, 113, 0.15); color: var(--success); }
        .badge-danger { background: rgba(231, 76, 60, 0.15); color: var(--danger); }
        .badge-warning { background: rgba(241, 196, 15, 0.15); color: var(--warning); }
        
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-primary { background: var(--luxury-gold); color: #000; }
        .btn-primary:hover { background: var(--luxury-gold-light); }
        .btn-outline { background: transparent; border: 1px solid var(--luxury-gold); color: var(--luxury-gold); }
        .btn-outline:hover { background: rgba(212, 175, 55, 0.1); }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

        /* Forms & Modals */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-gray); }
        .form-input { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--luxury-gold); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(3px); padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--panel-bg); border: 1px solid var(--luxury-gold); padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; position: relative; animation: slideUp 0.3s ease; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; color: var(--text-gray); line-height: 1; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; z-index: 2000; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; }
            .menu-toggle { display: block; }
            .overlay-bg.show { display: block; }
            .page-title { font-size: 1.4rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="auth-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--luxury-gold);">Memverifikasi Admin...</p>
    </div>

    <!-- MOBILE OVERLAY -->
    <div class="overlay-bg" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">Aurorra Admin</div>
        
        <nav class="nav-menu">
            <a class="nav-link active" data-tab="dashboard"><span>🏠</span> Dashboard</a>
            <a class="nav-link" data-tab="products"><span>🛍️</span> Produk</a>
            <a class="nav-link" data-tab="purchasing"><span>📥</span> Purchasing</a>
            <a class="nav-link" data-tab="orders"><span>🛒</span> Pesanan</a>
            <a class="nav-link" data-tab="vouchers"><span>🎟️</span> Voucher</a>
            <a class="nav-link" data-tab="lowstock"><span>⚠️</span> Stok Menipis</a>
            <a class="nav-link" data-tab="ongkir"><span>🚚</span> Ongkir</a>
        </nav>

        <div class="user-info">
            <div class="user-avatar">
                <div class="avatar-circle">A</div>
                <span style="font-size: 0.9rem;">Admin</span>
            </div>
            <!-- PERUBAHAN: Menambahkan onclick langsung di tombol -->
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="page-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
            </div>
        </header>

        <!-- CONTENT DYNAMIC -->
        <div id="contentArea"></div>
    </main>

    <!-- MODAL TEMPLATE -->
    <div class="modal-overlay" id="modalBox">
        <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h3 style="font-family:'Playfair Display'; color: var(--luxury-gold); margin-bottom: 20px;" id="modalTitle">Title</h3>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURASI & SETUP
        // ==========================================
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const formatPrice = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
        
        // ==========================================
        // 2. AUTH & NAVIGASI
        // ==========================================
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            // Uncomment baris di bawah untuk mengaktifkan proteksi halaman
            // if (!session) return window.location.href = 'login.html';
            init();
        };

        function init() {
            document.getElementById('auth-overlay').classList.add('hidden');
            setupNavigation();
            loadTab('dashboard');
        }

        function setupNavigation() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    const tab = link.getAttribute('data-tab');
                    loadTab(tab);
                    
                    // Active state
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    
                    // Close mobile sidebar
                    if(window.innerWidth <= 768) toggleSidebar();
                });
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function loadTab(tab) {
            const titles = { dashboard: 'Dashboard', products: 'Manajemen Produk', purchasing: 'Stok Masuk', orders: 'Pesanan', vouchers: 'Voucher', lowstock: 'Stok Menipis', ongkir: 'Ongkir' };
            document.getElementById('pageTitle').innerText = titles[tab] || 'Admin';
            
            const content = document.getElementById('contentArea');
            content.innerHTML = '<div class="spinner" style="margin: 50px auto;"></div>';

            switch(tab) {
                case 'dashboard': renderDashboard(); break;
                case 'products': renderProducts(); break;
                case 'purchasing': renderPurchasing(); break;
                case 'orders': renderOrders(); break;
                case 'vouchers': renderVouchers(); break;
                case 'lowstock': renderLowStock(); break;
                case 'ongkir': renderOngkir(); break;
            }
        }

        // ==========================================
        // 3. RENDER FUNCTIONS (VIEW)
        // ==========================================
        
        async function renderDashboard() {
            const [ordersRes, productsRes] = await Promise.all([
                sb.from('orders').select('id, total_amount, status').not('status', 'eq', 'cancelled'),
                sb.from('products').select('stock')
            ]);

            const revenue = ordersRes.data?.reduce((a, c) => a + (parseFloat(c.total_amount) || 0), 0) || 0;
            const ordersCount = ordersRes.data?.length || 0;
            const lowStock = productsRes.data?.filter(p => p.stock < 5).length || 0;

            document.getElementById('contentArea').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Revenue</div>
                        <div class="stat-value">${formatPrice(revenue)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Pesanan</div>
                        <div class="stat-value">${ordersCount}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Stok Menipis</div>
                        <div class="stat-value" style="color: ${lowStock > 0 ? 'var(--danger)' : 'var(--success)'}">${lowStock}</div>
                    </div>
                </div>
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Pesanan Terbaru</h3></div>
                    <div id="recentOrders"></div>
                </div>
            `;
            loadRecentOrders();
        }

        async function loadRecentOrders() {
            const { data } = await sb.from('orders').select('id, customer_name, total_amount, status, created_at').order('created_at', { ascending: false }).limit(5);
            const tbody = data?.map(o => `
                <tr>
                    <td>#${String(o.id).slice(0,6)}</td>
                    <td>${o.customer_name}</td>
                    <td>${formatPrice(o.total_amount)}</td>
                    <td><span class="badge badge-${o.status === 'completed' ? 'success' : 'warning'}">${o.status}</span></td>
                    <td style="font-size:0.8rem; color:#666;">${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('') || '<tr><td colspan="5">No data</td></tr>';
            
            document.getElementById('recentOrders').innerHTML = `<div class="table-container"><table><thead><tr><th>ID</th><th>Pelanggan</th><th>Total</th><th>Status</th><th>Tanggal</th></tr></thead><tbody>${tbody}</tbody></table></div>`;
        }

        async function renderProducts() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Produk</h3><button class="btn btn-primary" onclick="openProductModal()">+ Tambah</button></div>
                    <div class="table-container"><table><thead><tr><th>Nama</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr></thead><tbody id="prodTable"></tbody></table></div>
                </div>
            `;
            const { data } = await sb.from('products').select('*').order('name');
            document.getElementById('prodTable').innerHTML = data?.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${formatPrice(p.price)}</td>
                    <td style="color: ${p.stock < 5 ? 'var(--danger)' : '#fff'}">${p.stock}</td>
                    <td><button class="btn btn-outline btn-sm" onclick="openProductModal('${p.id}')">Edit</button></td>
                </tr>
            `).join('') || '';
        }

        async function renderVouchers() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Voucher</h3><button class="btn btn-primary" onclick="createVoucher()">+ Generate Baru</button></div>
                    <div class="table-container"><table><thead><tr><th>Code</th><th>Status</th><th>Dibuat</th><th>Aksi</th></tr></thead><tbody id="voucherTable"></tbody></table></div>
                </div>
            `;
            loadVouchers();
        }

        async function loadVouchers() {
            const { data } = await sb.from('vouchers').select('*').order('created_at', { ascending: false });
            document.getElementById('voucherTable').innerHTML = data?.map(v => `
                <tr>
                    <td style="font-family: monospace; font-weight: bold; color: var(--luxury-gold);">${v.code}</td>
                    <td><span class="badge badge-${v.is_used ? 'danger' : 'success'}">${v.is_used ? 'Used' : 'Available'}</span></td>
                    <td>${new Date(v.created_at).toLocaleDateString()}</td>
                    <td>${!v.is_used ? `<button class="btn btn-danger btn-sm" onclick="deleteVoucher('${v.id}')">Hapus</button>` : ''}</td>
                </tr>
            `).join('') || '';
        }

        async function createVoucher() {
            const btn = event.target;
            btn.innerHTML = "Generating...";
            const { error } = await sb.from('vouchers').insert([{ notes: 'Created by Admin' }]);
            if(error) return alert("Gagal: " + error.message);
            loadVouchers();
            btn.innerHTML = "+ Generate Baru";
        }
        
        async function deleteVoucher(id) {
            if(!confirm("Hapus voucher ini?")) return;
            await sb.from('vouchers').delete().eq('id', id);
            loadVouchers();
        }

        async function renderPurchasing() {
             document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Catat Pembelian (Stok Masuk)</h3><button class="btn btn-primary" onclick="openPurchaseModal()">+ Tambah</button></div>
                    <div class="table-container"><table><thead><tr><th>Produk</th><th>Qty</th><th>Harga Modal</th><th>Tanggal</th></tr></thead><tbody id="purchaseTable"></tbody></table></div>
                </div>
            `;
            const { data } = await sb.from('purchasing').select('qty, harga, created_at, products(name)');
            document.getElementById('purchaseTable').innerHTML = data?.map(p => `
                <tr>
                    <td>${p.products?.name || 'Unknown'}</td>
                    <td>+${p.qty}</td>
                    <td>${formatPrice(p.harga)}</td>
                    <td>${new Date(p.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('') || '';
        }

        async function renderOrders() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Semua Pesanan</h3></div>
                    <div class="table-container"><table><thead><tr><th>ID</th><th>Pelanggan</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="orderTable"></tbody></table></div>
                </div>
            `;
            const { data } = await sb.from('orders').select('*').order('created_at', { ascending: false });
             document.getElementById('orderTable').innerHTML = data?.map(o => `
                <tr>
                    <td>#${String(o.id).slice(0,6)}</td>
                    <td>${o.customer_name}</td>
                    <td>${formatPrice(o.total_amount)}</td>
                    <td><span class="badge badge-${o.status === 'completed' ? 'success' : 'warning'}">${o.status}</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="openOrderDetail('${o.id}')">Detail</button></td>
                </tr>
            `).join('') || '';
        }

        async function renderLowStock() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Alert Stok Menipis (< 5)</h3></div>
                    <div class="table-container"><table><thead><tr><th>Produk</th><th>Stok</th></tr></thead><tbody id="lowTable"></tbody></table></div>
                </div>
            `;
            const { data } = await sb.from('products').select('*').lt('stock', 5);
            document.getElementById('lowTable').innerHTML = data?.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td style="color: var(--danger); font-weight:bold;">${p.stock}</td>
                </tr>
            `).join('') || '<tr><td colspan="2" style="text-align:center; color:var(--success)">Stok Aman</td></tr>';
        }

        async function renderOngkir() {
             document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Ongkir</h3><button class="btn btn-primary" onclick="openOngkirModal()">+ Tambah</button></div>
                    <div class="table-container"><table><thead><tr><th>Tujuan</th><th>Ekspedisi</th><th>Tarif</th><th>Aksi</th></tr></thead><tbody id="ongkirTable"></tbody></table></div>
                </div>
            `;
            const { data } = await sb.from('ongkir').select('*');
            document.getElementById('ongkirTable').innerHTML = data?.map(o => `
                <tr>
                    <td>${o.tujuan}</td>
                    <td>${o.ekspedisi}</td>
                    <td>${formatPrice(o.tarif)}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteOngkir('${o.id}')">Hapus</button></td>
                </tr>
            `).join('') || '';
        }
        
        async function deleteOngkir(id) {
            if(!confirm("Hapus?")) return;
            await sb.from('ongkir').delete().eq('id', id);
            renderOngkir();
        }

        // ==========================================
        // 4. MODALS & ACTIONS
        // ==========================================
        
        function openModal(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modalBox').classList.add('show');
        }
        function closeModal() { document.getElementById('modalBox').classList.remove('show'); }
        
        // Product Modal
        async function openProductModal(id = null) {
            let prod = { name: '', price: '', image_url: '', category: 'unisex' };
            if(id) {
                const { data } = await sb.from('products').select('*').eq('id', id).single();
                if(data) prod = data;
            }
            
            openModal(id ? 'Edit Produk' : 'Tambah Produk', `
                <form onsubmit="saveProduct(event, '${id || ''}')">
                    <div class="form-group"><label class="form-label">Nama</label><input type="text" class="form-input" id="inpName" value="${prod.name}" required></div>
                    <div class="form-group"><label class="form-label">Harga</label><input type="number" class="form-input" id="inpPrice" value="${prod.price}" required></div>
                    <div class="form-group"><label class="form-label">Image URL</label><input type="text" class="form-input" id="inpImage" value="${prod.image_url}"></div>
                    <div class="form-group"><label class="form-label">Kategori</label>
                        <select class="form-input" id="inpCat">
                            <option value="women" ${prod.category==='women'?'selected':''}>Women</option>
                            <option value="men" ${prod.category==='men'?'selected':''}>Men</option>
                            <option value="unisex" ${prod.category==='unisex'?'selected':''}>Unisex</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%">Simpan</button>
                </form>
            `);
        }

        async function saveProduct(e, id) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('inpName').value,
                price: parseFloat(document.getElementById('inpPrice').value),
                image_url: document.getElementById('inpImage').value,
                category: document.getElementById('inpCat').value
            };
            
            if(id) {
                await sb.from('products').update(payload).eq('id', id);
            } else {
                await sb.from('products').insert([payload]);
            }
            closeModal();
            renderProducts();
        }

        // Purchase Modal
        async function openPurchaseModal() {
            const { data: prods } = await sb.from('products').select('id, name');
            const options = prods.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            
            openModal('Catat Pembelian', `
                <form onsubmit="savePurchase(event)">
                    <div class="form-group"><label class="form-label">Produk</label><select class="form-input" id="purProd" required><option value="">Pilih...</option>${options}</select></div>
                    <div class="form-group"><label class="form-label">Qty Masuk</label><input type="number" class="form-input" id="purQty" placeholder="10" required></div>
                    <div class="form-group"><label class="form-label">Harga Modal (Satuan)</label><input type="number" class="form-input" id="purPrice" placeholder="50000" required></div>
                    <button type="submit" class="btn btn-primary" style="width:100%">Simpan</button>
                </form>
            `);
        }

        async function savePurchase(e) {
            e.preventDefault();
            const payload = {
                product_id: document.getElementById('purProd').value,
                qty: parseInt(document.getElementById('purQty').value),
                harga: parseFloat(document.getElementById('purPrice').value)
            };
            await sb.from('purchasing').insert([payload]);
            closeModal();
            renderPurchasing();
        }

        // Order Detail Modal
        async function openOrderDetail(id) {
            const { data: o } = await sb.from('orders').select('*').eq('id', id).single();
            if(!o) return;

            openModal('Detail Pesanan #' + String(o.id).slice(0,6), `
                <div style="font-size:0.9rem;">
                    <p><b>Pelanggan:</b> ${o.customer_name}</p>
                    <p><b>Alamat:</b> ${o.customer_address}</p>
                    <hr style="border-color:#333; margin:15px 0;">
                    <div class="form-group"><label class="form-label">Status</label>
                        <select class="form-input" id="updStatus">
                            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                            <option value="paid" ${o.status==='paid'?'selected':''}>Paid</option>
                            <option value="shipping" ${o.status==='shipping'?'selected':''}>Shipping</option>
                            <option value="completed" ${o.status==='completed'?'selected':''}>Completed</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Resi</label><input type="text" class="form-input" id="updResi" value="${o.resi || ''}"></div>
                    <button class="btn btn-primary" style="width:100%" onclick="updateOrder('${id}')">Update</button>
                </div>
            `);
        }

        async function updateOrder(id) {
            const status = document.getElementById('updStatus').value;
            const resi = document.getElementById('updResi').value;
            await sb.from('orders').update({ status, resi }).eq('id', id);
            closeModal();
            renderOrders();
        }
        
        // Ongkir Modal
        function openOngkirModal() {
             openModal('Tambah Ongkir', `
                <form onsubmit="saveOngkir(event)">
                    <div class="form-group"><label class="form-label">Kota Tujuan</label><input type="text" class="form-input" id="ongkDest" required></div>
                    <div class="form-group"><label class="form-label">Ekspedisi</label><input type="text" class="form-input" id="ongkEksp" required></div>
                    <div class="form-group"><label class="form-label">Tarif</label><input type="number" class="form-input" id="ongkTarif" required></div>
                    <button type="submit" class="btn btn-primary" style="width:100%">Simpan</button>
                </form>
            `);
        }
        
        async function saveOngkir(e) {
            e.preventDefault();
            const payload = {
                tujuan: document.getElementById('ongkDest').value,
                ekspedisi: document.getElementById('ongkEksp').value,
                tarif: parseFloat(document.getElementById('ongkTarif').value),
                estimasi: '3-5 hari' // Default
            };
            await sb.from('ongkir').insert([payload]);
            closeModal();
            renderOngkir();
        }

        // ==========================================
        // 5. LOGOUT FUNCTION (PERBAIKAN)
        // ==========================================
        async function handleLogout() {
            if(confirm("Apakah Anda yakin ingin logout?")) {
                // Hapus sesi Supabase
                const { error } = await sb.auth.signOut();
                
                if (error) {
                    alert("Gagal logout: " + error.message);
                    return;
                }

                // Arahkan ke index.html
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurorra Admin Panel</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- VARIABLE & RESET --- */
        :root {
            --luxury-gold: #d4af37;
            --luxury-gold-light: #f3e5ab;
            --dark-bg: #0f0c15;
            --panel-bg: #161216;
            --card-bg: #1a1620;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            display: flex;
            overflow-x: hidden;
        }

        /* --- AUTH OVERLAY --- */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--dark-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        #auth-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--luxury-gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--panel-bg);
            border-right: 1px solid rgba(212, 175, 55, 0.1);
            position: fixed; left: 0; top: 0;
            display: flex; flex-direction: column;
            padding: 20px 15px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--luxury-gold);
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .nav-menu { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--luxury-gold);
        }
        .nav-link.active { border-left: 3px solid var(--luxury-gold); }

        .notif-settings {
            border-top: 1px solid rgba(255,255,255,0.05); 
            padding-top: 15px; margin-top: 15px;
        }
        .btn-notif-toggle {
            width: 100%; padding: 10px; 
            background: rgba(52, 152, 219, 0.1); border: 1px solid rgba(52, 152, 219, 0.3); 
            color: #3498db; border-radius: 6px; cursor: pointer; 
            transition: 0.2s; font-family: 'Poppins', sans-serif; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-notif-toggle:hover { background: #3498db; color: #fff; }
        .btn-notif-toggle.active { background: var(--success); border-color: var(--success); color: #fff; }

        .user-info { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px; }
        .user-avatar { width: 100%; display: flex; align-items: center; gap: 10px; }
        .avatar-circle { width: 35px; height: 35px; background: var(--luxury-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 0.8rem; }
        
        .logout-btn { 
            width: 100%; margin-top: 10px; padding: 10px; 
            background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3); 
            color: var(--danger); border-radius: 6px; cursor: pointer; 
            transition: 0.2s; font-family: 'Poppins', sans-serif; font-size: 0.85rem;
        }
        .logout-btn:hover { background: var(--danger); color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 25px;
            width: 100%;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
        
        .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--luxury-gold); }
        .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }

        /* --- COMPONENTS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
        }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: rgba(212, 175, 55, 0.05); border-radius: 0 0 0 100%; }
        .stat-label { font-size: 0.85rem; color: var(--text-gray); margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 600; color: var(--text-white); }

        .card-section {
            background: var(--card-bg); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; margin-bottom: 30px;
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        .section-title { font-family: 'Playfair Display', font-size: 1.2rem; color: var(--luxury-gold); }

        /* --- SEARCH INPUT STYLE --- */
        .search-wrapper {
            position: relative; width: 100%; max-width: 300px;
        }
        .search-input {
            width: 100%; padding: 8px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: #fff; font-family: inherit; font-size: 0.85rem; transition: 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--luxury-gold); background: rgba(0,0,0,0.3); }
        .search-input::placeholder { color: #666; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px 10px; color: var(--text-gray); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(46, 204, 113, 0.15); color: var(--success); }
        .badge-danger { background: rgba(231, 76, 60, 0.15); color: var(--danger); }
        .badge-warning { background: rgba(241, 196, 15, 0.15); color: var(--warning); }
        .badge-info { background: rgba(52, 152, 219, 0.15); color: #3498db; }
        
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-primary { background: var(--luxury-gold); color: #000; }
        .btn-primary:hover { background: var(--luxury-gold-light); }
        .btn-danger { background: rgba(231, 76, 60, 0.2); color: var(--danger); border: 1px solid rgba(231, 76, 60, 0.3); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--luxury-gold); color: var(--luxury-gold); }
        .btn-outline:hover { background: rgba(212, 175, 55, 0.1); }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-gray); }
        .form-input { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--luxury-gold); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(3px); padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--panel-bg); border: 1px solid var(--luxury-gold); padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; position: relative; animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; color: var(--text-gray); line-height: 1; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- NOTIFIKASI TOAST --- */
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--luxury-gold), #b8860b);
            color: #000;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10000;
            display: none;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            animation: slideInRight 0.5s forwards;
            cursor: pointer;
        }
        .notification-toast.show { display: flex; }
        .notif-icon { font-size: 1.5rem; }
        .notif-content { text-align: left; }
        .notif-title { font-size: 1rem; }
        .notif-sub { font-size: 0.8rem; opacity: 0.8; font-weight: 400; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; z-index: 2000; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; }
            .menu-toggle { display: block; }
            .overlay-bg.show { display: block; }
            .page-title { font-size: 1.4rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .notification-toast { width: 90%; left: 5%; right: 5%; bottom: 20px; top: auto; }
            .search-wrapper { max-width: 100%; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="auth-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--luxury-gold);">Memverifikasi Keamanan...</p>
    </div>

    <!-- NOTIFICATION TOAST -->
    <div id="notifToast" class="notification-toast" onclick="this.classList.remove('show')">
        <div class="notif-icon">🛒</div>
        <div class="notif-content">
            <div class="notif-title">Pesanan Baru Masuk!</div>
            <div class="notif-sub" id="notifText">Ada pesanan baru dari pelanggan.</div>
        </div>
    </div>

    <!-- MOBILE OVERLAY -->
    <div class="overlay-bg" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">Aurorra Admin</div>
        
        <nav class="nav-menu">
            <a class="nav-link active" data-tab="dashboard"><span>🏠</span> Dashboard</a>
            <a class="nav-link" data-tab="analytics"><span>📊</span> Analytics</a>
            <a class="nav-link" data-tab="products"><span>🛍️</span> Produk</a>
            <a class="nav-link" data-tab="parfum"><span>🧴</span> Stok Parfum</a>
            <a class="nav-link" data-tab="purchasing"><span>📥</span> Purchasing</a>
            <a class="nav-link" data-tab="orders"><span>🛒</span> Pesanan</a>
            <a class="nav-link" data-tab="shipping"><span>📦</span> Pengiriman</a>
            <a class="nav-link" data-tab="customers"><span>👤</span> Pelanggan</a>
            <a class="nav-link" data-tab="vouchers"><span>🎟️</span> Voucher</a>
            <a class="nav-link" data-tab="lowstock"><span>⚠️</span> Stok Menipis</a>
            <a class="nav-link" data-tab="ongkir"><span>🚚</span> Ongkir</a>
            <a class="nav-link" data-tab="settings"><span>⚙️</span> Pengaturan</a>
        </nav>

        <div class="notif-settings">
            <button class="btn-notif-toggle" id="btnNotif" onclick="toggleChromeNotif()">
                <span>🔔</span> <span id="txtNotifStatus">Aktifkan Notifikasi</span>
            </button>
        </div>

        <div class="user-info">
            <div class="user-avatar">
                <div class="avatar-circle" id="userAvatar">A</div>
                <span style="font-size: 0.9rem;" id="userName">Admin</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="page-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
            </div>
        </header>

        <!-- CONTENT DYNAMIC -->
        <div id="contentArea"></div>
    </main>

    <!-- MODAL TEMPLATE -->
    <div class="modal-overlay" id="modalBox">
        <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h3 style="font-family:'Playfair Display'; color: var(--luxury-gold); margin-bottom: 20px;" id="modalTitle">Title</h3>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- AUDIO NOTIF -->
    <audio id="notifSound" src="https://cdn.freesound.org/previews/320/320655_5260872-lq.mp3" preload="auto"></audio>

    <script>
        // ==========================================
        // 1. KONFIGURASI & KEAMANAN
        // ==========================================
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_EMAILS = ['admin@aurorra.com', 'owner@aurorra.com']; 

        const formatPrice = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
        
        // ==========================================
        // 2. AUTHENTICATION CHECK
        // ==========================================
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            checkAdminAccess(session);
        };

        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') {
                window.location.href = 'index.html'; 
            }
        });

        async function checkAdminAccess(session) {
            const overlay = document.getElementById('auth-overlay');
            
            if (!session) {
                alert("Akses Ditolak: Silakan login terlebih dahulu.");
                window.location.href = 'index.html';
                return;
            }

            const userEmail = session.user.email;
            const userId = session.user.id;
            const isAdmin = ADMIN_EMAILS.includes(userEmail);

            if (!isAdmin) {
                 console.warn("User bukan admin terdaftar, tapi diberi akses (mode longgar).");
            }

            let displayName = userEmail.split('@')[0];
            try {
                const { data: userData } = await sb.from('ngebelusers').select('full_name').eq('id', userId).single();
                if (userData && userData.full_name) {
                    displayName = userData.full_name;
                }
            } catch (e) {
                console.log("Gagal ambil data nama user, pakai email:", e.message);
            }
            
            document.getElementById('userName').innerText = displayName;
            document.getElementById('userAvatar').innerText = displayName.charAt(0).toUpperCase();

            overlay.classList.add('hidden');
            init();
        }

        function init() {
            setupNavigation();
            loadTab('dashboard');
            setupRealtimeOrders();
            checkNotifPermission();
        }

        // ==========================================
        // 3. NAVIGASI
        // ==========================================
        function setupNavigation() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    const tab = link.getAttribute('data-tab');
                    loadTab(tab);
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    if(window.innerWidth <= 768) toggleSidebar();
                });
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function loadTab(tab) {
            const titles = { 
                dashboard: 'Dashboard', 
                analytics: 'Analitik Pengunjung', 
                products: 'Manajemen Produk', 
                parfum: 'Stok Parfum',
                purchasing: 'Stok Masuk', 
                orders: 'Pesanan', 
                shipping: 'Pengiriman', 
                customers: 'Pelanggan', 
                vouchers: 'Voucher', 
                lowstock: 'Stok Menipis', 
                ongkir: 'Ongkir',
                settings: 'Pengaturan Situs' 
            };
            document.getElementById('pageTitle').innerText = titles[tab] || 'Admin';
            
            const content = document.getElementById('contentArea');
            content.innerHTML = '<div class="spinner" style="margin: 50px auto;"></div>';

            switch(tab) {
                case 'dashboard': renderDashboard(); break;
                case 'analytics': renderAnalytics(); break;
                case 'products': renderProducts(); break;
                case 'parfum': renderParfum(); break;
                case 'purchasing': renderPurchasing(); break;
                case 'orders': renderOrders(); break;
                case 'shipping': renderShipping(); break; 
                case 'customers': renderCustomers(); break; 
                case 'vouchers': renderVouchers(); break;
                case 'lowstock': renderLowStock(); break;
                case 'ongkir': renderOngkir(); break;
                case 'settings': renderSettings(); break; 
            }
        }

        // ==========================================
        // 4. NOTIFIKASI
        // ==========================================
        function checkNotifPermission() {
            const btn = document.getElementById('btnNotif');
            const txt = document.getElementById('txtNotifStatus');
            if (!("Notification" in window)) { txt.innerText = "Notif Tidak Support"; btn.disabled = true; return; }
            if (Notification.permission === "granted") { txt.innerText = "Notifikasi Aktif"; btn.classList.add('active'); } 
            else if (Notification.permission === "denied") { txt.innerText = "Notif Diblokir"; btn.style.opacity = 0.5; } 
            else { txt.innerText = "Aktifkan Notifikasi"; }
        }

        async function toggleChromeNotif() {
            if (!("Notification" in window)) return;
            if (Notification.permission !== "granted") {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    checkNotifPermission();
                    new Notification("Aurorra Admin", { body: "Notifikasi berhasil diaktifkan!" });
                }
            } else { alert("Notifikasi sudah aktif."); }
        }

        function triggerChromeNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: body, requireInteraction: true });
            }
        }

        function setupRealtimeOrders() {
            const channel = sb.channel('admin-orders-notif')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, (payload) => {
                const order = payload.new;
                showNotification(order);
                try { const audio = document.getElementById('notifSound'); audio.currentTime = 0; audio.play(); } catch(e) {}
                triggerChromeNotification("🛒 Pesanan Baru!", `${order.customer_name} - ${formatPrice(order.total_amount)}`);
                if(document.querySelector('.nav-link.active').getAttribute('data-tab') === 'dashboard') renderDashboard();
            })
            .subscribe();
        }

        function showNotification(order) {
            const notifText = document.getElementById('notifText');
            notifText.innerText = `${order.customer_name} - ${formatPrice(order.total_amount)}`;
            const toast = document.getElementById('notifToast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 5000);
        }

        // ==========================================
        // 5. RENDER FUNCTIONS
        // ==========================================
        
        async function renderDashboard() {
            const [ordersRes, productsRes] = await Promise.all([
                sb.from('orders').select('id, total_amount, status').in('status', ['paid', 'shipping', 'completed']),
                sb.from('products').select('stock')
            ]);
            const revenue = ordersRes.data?.reduce((a, c) => a + (parseFloat(c.total_amount) || 0), 0) || 0;
            const ordersCount = ordersRes.data?.length || 0;
            const lowStock = productsRes.data?.filter(p => p.stock < 5).length || 0;
            document.getElementById('contentArea').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value">${formatPrice(revenue)}</div></div>
                    <div class="stat-card"><div class="stat-label">Pesanan Aktif</div><div class="stat-value">${ordersCount}</div></div>
                    <div class="stat-card"><div class="stat-label">Stok Menipis</div><div class="stat-value" style="color: ${lowStock > 0 ? 'var(--danger)' : 'var(--success)'}">${lowStock}</div></div>
                </div>
                <div class="card-section"><div class="section-header"><h3 class="section-title">Pesanan Terbaru</h3></div><div id="recentOrders"></div></div>`;
            loadRecentOrders();
        }

        let visitorChart = null; 
        
        async function renderAnalytics() {
            document.getElementById('contentArea').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-label">Total Pengunjung</div><div class="stat-value" id="totalVisitors">0</div></div>
                    <div class="stat-card"><div class="stat-label">Hari Ini</div><div class="stat-value" id="todayVisitors">0</div></div>
                </div>
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Grafik Kunjungan (7 Hari Terakhir)</h3></div>
                    <div style="height: 300px; width: 100%;"><canvas id="visitorChart"></canvas></div>
                </div>

                </div>`;

            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const { data: views } = await sb.from('page_views').select('*').gte('created_at', sevenDaysAgo.toISOString()).order('created_at', { ascending: false });
            
            if (!views || views.length === 0) {
                document.getElementById('logTable').innerHTML = '<tr><td colspan="3">Belum ada data.</td></tr>';
                return;
            }

            const todayStr = now.toISOString().split('T')[0];
            const todayVisitors = views.filter(v => v.created_at.startsWith(todayStr)).length;
            
            document.getElementById('totalVisitors').innerText = views.length;
            document.getElementById('todayVisitors').innerText = todayVisitors;

            const daily = {};
            views.forEach(v => {
                const day = v.created_at.split('T')[0];
                if (!daily[day]) daily[day] = 0;
                daily[day]++;
            });

            const labels = Object.keys(daily).sort();
            const values = labels.map(key => daily[key]);

            const ctx = document.getElementById('visitorChart').getContext('2d');
            if (visitorChart) visitorChart.destroy();

            visitorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Visitor',
                        data: values,
                        borderColor: '#d4af37',
                        backgroundColor: 'rgba(212, 175, 55, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.05)' } },

                    }
                }
            });

            const logBody = views.slice(0, 20).map(v => {
                const isMobile = v.user_agent?.match(/Mobi|Android/i);
                const isBot = v.user_agent?.match(/Bot|Spider|Crawler/i);
                let deviceLabel = isMobile ? 'Mobile' : 'Desktop';

                return `<tr><td>${v.page_url}</td><td>${new Date(v.created_at).toLocaleString('id-ID')}</td><td>${deviceLabel}</td></tr>`;
            }).join('');
            document.getElementById('logTable').innerHTML = logBody;
        }

                        <h3 class="section-title">Ongkir</h3>
                        <div style="display:flex; gap:10px; align-items:center;">
                             <div class="search-wrapper"><input type="text" class="search-input" id="searchOngkir" placeholder="Cari asal, tujuan, ekspedisi..." onkeyup="filterOngkir()"></div>
                             <button class="btn btn-primary" onclick="openOngkirModal()">+ Tambah</button>
                        </div>
                    </div>
                    <div class="table-container"><table><thead><tr><th>Asal</th><th>Tujuan</th><th>Ekspedisi</th><th>Estimasi</th><th>Tarif</th><th>Aksi</th></tr></thead><tbody id="ongkirTable"></tbody></table></div>
                </div>`;
            
            // Mengambil data dengan error handling
            const { data, error } = await sb.from('ongkir').select('*');
            if(error){
                console.error("Gagal ambil data ongkir:", error);
                document.getElementById('ongkirTable').innerHTML = `<tr><td colspan="6" style="color:var(--danger)">Gagal memuat data: ${error.message}</td></tr>`;
                return;
            }

            allOngkir = data || [];
            filterOngkir();
        }
        
        function filterOngkir() {
            const q = document.getElementById('searchOngkir')?.value;
            const filtered = getFilteredRows(allOngkir, q);
            document.getElementById('ongkirTable').innerHTML = filtered?.map(o => `
                <tr>
                    <td>${o.asal || '-'}</td>
                    <td>${o.tujuan}</td>
                    <td>${o.ekspedisi}</td>
                    <td>${o.estimasi || '-'}</td>
                    <td>${formatPrice(o.tarif)}</td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="openOngkirModal('${o.id}')">Edit</button> 
                        <button class="btn btn-danger btn-sm" onclick="deleteOngkir('${o.id}')">Hapus</button>
                    </td>
                </tr>
            `).join('') || '';
        }

        async function deleteOngkir(id) { 
            if(!confirm("Hapus?")) return; 
            const { error } = await sb.from('ongkir').delete().eq('id', id);
            if(error) alert("Gagal menghapus: " + error.message);
            renderOngkir(); 
        }

        async function renderSettings() {
            const { data: settings } = await sb.from('settings').select('*');
            const getVal = (key) => settings?.find(s => s.key === key)?.value || '';
            document.getElementById('contentArea').innerHTML = `
                <div class="card-section">
                    <div class="section-header"><h3 class="section-title">Pengaturan</h3></div>
                    <form onsubmit="saveSettings(event)">
                        <div class="form-group"><label class="form-label">Nama Toko</label><input type="text" class="form-input" id="setStoreName" value="${getVal('store_name')}"></div>
                        <div class="form-group"><label class="form-label">Alamat</label><input type="text" class="form-input" id="setAddress" value="${getVal('address')}"></div>
                        <div class="form-group"><label class="form-label">No. WhatsApp</label><input type="text" class="form-input" id="setWa" value="${getVal('whatsapp')}" placeholder="62812..."></div>
                        <button type="submit" class="btn btn-primary">Simpan</button>
                    </form>
                </div>`;
        }

        async function saveSettings(e) {
            e.preventDefault();
            const payload = [
                { key: 'store_name', value: document.getElementById('setStoreName').value },
                { key: 'address', value: document.getElementById('setAddress').value },
                { key: 'whatsapp', value: document.getElementById('setWa').value }
            ];
            for(let p of payload) { await sb.from('settings').upsert(p, { onConflict: 'key' }); }
            alert("Tersimpan!");
        }

        // ==========================================
        // 7. MODALS & ACTIONS
        // ==========================================
        
        function openModal(title, content) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('modalBox').classList.add('show'); }
        function closeModal() { document.getElementById('modalBox').classList.remove('show'); }
        
        async function openProductModal(id = null) {
            let prod = { name: '', price: '', image_url: '', category: 'unisex' };
            if(id) { const { data } = await sb.from('products').select('*').eq('id', id).single(); if(data) prod = data; }
            openModal(id ? 'Edit Produk' : 'Tambah Produk', `<form onsubmit="saveProduct(event, '${id || ''}')"><div class="form-group"><label>Nama</label><input type="text" class="form-input" id="inpName" value="${prod.name}" required></div><div class="form-group"><label>Harga</label><input type="number" class="form-input" id="inpPrice" value="${prod.price}" required></div><div class="form-group"><label>Image URL</label><input type="text" class="form-input" id="inpImage" value="${prod.image_url}"></div><div class="form-group"><label>Kategori</label><select class="form-input" id="inpCat"><option value="women" ${prod.category==='women'?'selected':''}>Women</option><option value="men" ${prod.category==='men'?'selected':''}>Men</option><option value="unisex" ${prod.category==='unisex'?'selected':''}>Unisex</option></select></div><button type="submit" class="btn btn-primary" style="width:100%">Simpan</button></form>`);
        }

        async function saveProduct(e, id) {
            e.preventDefault(); const payload = { name: document.getElementById('inpName').value, price: parseFloat(document.getElementById('inpPrice').value), image_url: document.getElementById('inpImage').value, category: document.getElementById('inpCat').value };
            if(id) { await sb.from('products').update(payload).eq('id', id); } else { await sb.from('products').insert([payload]); } closeModal(); renderProducts();
        }

        async function openOrderDetail(id) {
            const { data: o } = await sb.from('orders').select('*').eq('id', id).single(); if(!o) return;
            const couriers = ['JNE', 'J&T', 'SiCepat', 'AnterAja', 'POS Indonesia', 'Ninja', 'Wahana', 'Lainnya'];
            const courierOptions = couriers.map(c => `<option value="${c}" ${o.courier === c ? 'selected' : ''}>${c}</option>`).join('');
            openModal('Detail Pesanan #' + String(o.id).slice(0,6), `
                <div style="font-size:0.9rem;">
                    <p><b>Pelanggan:</b> ${o.customer_name}</p>
                    <p><b>Alamat:</b> ${o.customer_address}</p><hr style="border-color:#333; margin:15px 0;">
                    <div class="form-group"><label>Status</label><select class="form-input" id="updStatus"><option value="pending" ${o.status==='pending'?'selected':''}>Pending</option><option value="paid" ${o.status==='paid'?'selected':''}>Paid</option><option value="shipping" ${o.status==='shipping'?'selected':''}>Shipping</option><option value="completed" ${o.status==='completed'?'selected':''}>Completed</option></select></div>
                    <div class="form-group"><label>Kurir</label><select class="form-input" id="updCourier"><option value="">- Pilih -</option>${courierOptions}</select></div>
                    <div class="form-group"><label>No. Resi</label><input type="text" class="form-input" id="updTracking" value="${o.tracking_number || ''}" placeholder="Masukkan resi"></div>
                    <button class="btn btn-primary" style="width:100%" onclick="updateOrder('${id}')">Simpan</button>
                </div>
            `);
        }

        async function updateOrder(id) { 
            const status = document.getElementById('updStatus').value; 
            const courier = document.getElementById('updCourier').value; 
            const tracking_number = document.getElementById('updTracking').value; 
            await sb.from('orders').update({ status, courier, tracking_number }).eq('id', id); 
            closeModal(); 
            const activeTab = document.querySelector('.nav-link.active').getAttribute('data-tab');
            if(activeTab === 'shipping') renderShipping(); else renderOrders();
        }
        
        async function openOngkirModal(id = null) {
            // Set default values sesuai struktur tabel terakhir
            let data = { asal: 'jakarta', tujuan: '', ekspedisi: 'jne', tarif: '', estimasi: '2-3 hari' };
            if(id) { 
                const res = await sb.from('ongkir').select('*').eq('id', id).single(); 
                if(res.data) data = res.data; 
            }
            openModal(id ? 'Edit Ongkir' : 'Tambah Ongkir', `
                <form onsubmit="saveOngkir(event, '${id || ''}')">
                    <div class="form-group">
                        <label class="form-label">Kota Asal</label>
                        <input type="text" class="form-input" id="ongkAsal" value="${data.asal}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Kota Tujuan</label>
                        <input type="text" class="form-input" id="ongkDest" value="${data.tujuan}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ekspedisi</label>
                        <input type="text" class="form-input" id="ongkEksp" value="${data.ekspedisi}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Estimasi</label>
                        <input type="text" class="form-input" id="ongkEst" value="${data.estimasi}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tarif</label>
                        <input type="number" class="form-input" id="ongkTarif" value="${data.tarif}" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%">Simpan</button>
                </form>
            `);
        }
        
        // PERBAIKAN UTAMA: Menambahkan ID generator dan updated_at
        async function saveOngkir(e, id) { 
            e.preventDefault(); 
            
            const payload = { 
                asal: document.getElementById('ongkAsal').value, 
                tujuan: document.getElementById('ongkDest').value, 
                ekspedisi: document.getElementById('ongkEksp').value, 
                estimasi: document.getElementById('ongkEst').value, 
                tarif: parseInt(document.getElementById('ongkTarif').value) || 0,
                updated_at: new Date().toISOString() // Tambahkan timestamp
            }; 

            let error = null;

            if(id) { 
                // Mode Edit
                const res = await sb.from('ongkir').update(payload).eq('id', id); 
                error = res.error;
            } else { 
                // Mode Tambah - Generate UUID manual jika DB tidak otomatis
                const newId = crypto.randomUUID(); // Generate UUID v4
                const res = await sb.from('ongkir').insert([{ ...payload, id: newId }]); 
                error = res.error;
            } 
            
            if(error) {
                console.error("Save Error:", error);
                alert("Gagal menyimpan data ongkir!\n\nPesan Error: " + error.message + "\n\nPastikan RLS Policy di Supabase diizinkan untuk INSERT.");
            } else {
                closeModal(); 
                renderOngkir();
            }
        }

        async function handleLogout() { if(confirm("Logout?")) { await sb.auth.signOut(); window.location.href = 'index.html'; } }
    </script>
</body>
</html>

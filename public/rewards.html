<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurorra Rewards</title>
    
    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- 1. VARIABLE & RESET --- */
        :root {
            --luxury-gold: #d4af37;
            --luxury-gold-light: #f3e5ab;
            --luxury-red: #8a1c1c;
            --dark-bg: #0f0c15;
            --dark-card: #161216;
            --text-gray: #a0a0a0;
            --text-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background: rgba(15, 12, 21, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-white);
            text-decoration: none;
            letter-spacing: 1px;
        }
        .logo:hover { color: var(--luxury-gold); }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--luxury-gold); }

        /* --- CONTAINER --- */
        .legal-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 140px 20px 80px;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- REWARD DASHBOARD CARD --- */
        .rewards-container {
            background: var(--dark-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .points-display {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .points-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .points-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--luxury-gold);
            font-family: 'Playfair Display', serif;
        }

        /* --- FORM EXCHANGE --- */
        .exchange-form {
            display: flex;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto 40px;
            justify-content: center;
        }

        .exchange-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0a080c;
            color: #fff;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            text-align: center;
        }

        .exchange-input:focus {
            border-color: var(--luxury-gold);
        }

        .btn-exchange {
            padding: 12px 25px;
            background: var(--luxury-gold);
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-exchange:hover {
            background: #fff;
        }
        
        .btn-exchange:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .info-text {
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-bottom: 40px;
        }

        /* --- HISTORY LIST --- */
        .history-list {
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }

        .history-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .history-item:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(255,255,255,0.05);
        }

        .voucher-code {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: var(--luxury-gold);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .voucher-details {
            text-align: right;
        }

        .voucher-val {
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .voucher-date {
            font-size: 0.75rem;
            color: #666;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--text-gray);
            color: var(--text-gray);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }
        
        .copy-btn:hover {
            border-color: var(--luxury-gold);
            color: var(--luxury-gold);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .exchange-form {
                flex-direction: column;
            }
            .points-value { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div style="width: 20px;"></div>
        <a href="#" class="logo">Aurorra ⚡</a>
        <div style="width: 20px;"></div>
    </header>

    <div class="legal-wrapper">
        
        <!-- Tombol Kembali -->
        <a href="index.html" class="back-link">
            <span>&larr;</span>Kembali ke Beranda
        </a>

        <div class="rewards-container">
            
            <!-- Display Saldo Poin -->
            <div class="points-display">
                <p class="points-title">Saldo Poin Anda</p>
                <h1 class="points-value" id="userPoints">0</h1>
            </div>

            <!-- Form Penukaran -->
            <p class="info-text">Tukar 100 Poin untuk mendapatkan Diskon Rp10.000</p>
            
            <form class="exchange-form" id="redeemForm">
                <input type="number" id="pointsInput" class="exchange-input" placeholder="Jumlah Poin (Kelipatan 100)" min="100" step="100" required>
                <button type="submit" class="btn-exchange" id="redeemBtn">Tukar Poin</button>
            </form>

            <!-- Riwayat Penukaran -->
            <div class="history-list">
                <h3 class="history-header">Riwayat Voucher</h3>
                <div id="historyContainer">
                    <p style="color: #666; text-align: center;">Memuat riwayat...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const RATE = 100; // 100 Poin = Rp 10.000 Diskon

        // 1. Load Data Poin & Riwayat Saat Halaman Dibuka
        async function loadRewardsData() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                alert("Silakan login terlebih dahulu.");
                window.location.href = "login.html";
                return;
            }

            // === PERUBAHAN: Menggunakan tabel 'ngebelusers' dan kolom 'loyalty_points' ===
            const { data: userData, error } = await supabaseClient
                .from('ngebelusers')
                .select('loyalty_points')
                .eq('user_id', user.id)
                .single();

            if (userData) {
                document.getElementById('userPoints').innerText = userData.loyalty_points;
            } else {
                // Jika user ada di auth tapi belum ada di ngebelusers (kadang terjadi saat baru daftar)
                alert("Data profil Anda belum ditemukan. Silakan hubungi admin.");
                document.getElementById('userPoints').innerText = "0";
            }

            // Ambil Riwayat Redemption
            const { data: history, error: historyError } = await supabaseClient
                .from('rewards_redemption')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            const historyContainer = document.getElementById('historyContainer');
            
            if (history && history.length > 0) {
                historyContainer.innerHTML = '';
                history.forEach(item => {
                    const date = new Date(item.created_at).toLocaleDateString('id-ID');
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div>
                            <div class="voucher-code">${item.voucher_code}</div>
                            <div class="voucher-date">${date}</div>
                        </div>
                        <div class="voucher-details">
                            <div class="voucher-val">Diskon Rp${item.discount_amount.toLocaleString('id-ID')}</div>
                            <button class="copy-btn" onclick="copyCode('${item.voucher_code}')">Salin Kode</button>
                        </div>
                    `;
                    historyContainer.appendChild(div);
                });
            } else {
                historyContainer.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">Belum ada riwayat penukaran.</p>';
            }
        }

        // 2. Handle Form Penukaran
        document.getElementById('redeemForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return alert("Sesi habis, silakan login ulang.");

            const pointsToRedeem = parseInt(document.getElementById('pointsInput').value);
            const btn = document.getElementById('redeemBtn');

            // Validasi Input
            if (pointsToRedeem < 100 || pointsToRedeem % 100 !== 0) {
                alert("Penukaran harus kelipatan 100 (Min. 100 Poin).");
                return;
            }

            // Cek Saldo Cukup?
            const currentBalance = parseInt(document.getElementById('userPoints').innerText);
            if (pointsToRedeem > currentBalance) {
                alert("Poin Anda tidak mencukupi!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                // Hitung Diskon
                const discountAmount = (pointsToRedeem / RATE) * 10000; // 100 poin = 10rb
                
                // Generate Kode Unik
                const voucherCode = `AURORA-${Date.now().toString(36).toUpperCase()}-${user.id.slice(0,4)}`;

                // === PERUBAHAN: Update poin di tabel 'ngebelusers' ===
                const { error: updateError } = await supabaseClient
                    .from('ngebelusers')
                    .update({ loyalty_points: currentBalance - pointsToRedeem })
                    .eq('user_id', user.id);

                if (updateError) throw updateError;

                // 2. Catat Riwayat di Tabel rewards_redemption
                const { error: insertError } = await supabaseClient
                    .from('rewards_redemption')
                    .insert([{
                        user_id: user.id,
                        voucher_code: voucherCode,
                        points_spent: pointsToRedeem,
                        discount_amount: discountAmount
                    }]);

                if (insertError) throw insertError;

                alert(`Berhasil! Anda mendapatkan kode voucher:\n${voucherCode}\n(Senilai Rp${discountAmount.toLocaleString('id-ID')})`);
                
                // Reload Data
                loadRewardsData();
                document.getElementById('pointsInput').value = '';

            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan sistem.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Tukar Poin";
            }
        });

        // Helper: Copy to Clipboard
        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                alert("Kode berhasil disalin: " + code);
            });
        }

        // Init
        loadRewardsData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran - Aurorra Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --luxury-gold: #d4af37; 
            --dark-bg: #0f0c15; 
            --card-bg: #1a1620; 
            --danger-color: #ff4d4d; 
        }
        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            background: rgba(15, 12, 21, 0.95); 
            border-bottom:1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        .back-link { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: color 0.3s; 
            cursor: pointer; 
        }
        .back-link:hover { color: var(--luxury-gold); }
        .brand-name { 
            font-family: 'Playfair Display', serif; 
            color: var(--luxury-gold); 
            font-size: 1.2rem; 
            font-weight: 700; 
        }
        
        .payment-wrapper { 
            flex:1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 8%; 
            position: relative; 
        }
        .payment-card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); 
            position: relative; 
            text-align: center;
        }
        
        .payment-logo { 
            width: 80px; 
            height: 80px; 
            margin: 0 auto 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #FFD700, #FDB931); 
            border-radius: 50%; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .payment-logo svg {
            width: 50%;
            height: 50%;
            fill: #000;
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            text-align: center; 
            color: var(--luxury-gold); 
            margin-bottom: 10px; 
        }
        .sub-text { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }
        
        .item-summary { 
            background: rgba(0,0,0, 0.2); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: left;
        }
        .summary-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.9rem; 
            color: #ddd; 
        }
        .summary-total { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px solid var(--luxury-gold); 
            font-weight: 700; 
            font-size: 1.1rem; 
            color: var(--luxury-gold); 
        }
        
        .btn-doku { 
            width: 100%; 
            padding: 18px; 
            background: var(--luxury-gold); 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 30px; 
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .btn-doku:hover:not(:disabled) { 
            background: #ffed4a; 
            transform: translateY(-2px);
        }
        .btn-doku:disabled { 
            background: #444; 
            cursor: not-allowed; 
            color: #888; 
            transform: none;
            box-shadow: none;
        }
        
        .error-box { 
            display:none; 
            background:rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--danger-color); 
            color:#ffcccc; 
            padding:15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: left; 
            font-size: 0.85rem;
            word-break: break-all;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <a href="checkout.html" class="back-link">
            <span>&larr;</span> Kembali
        </a>
        <div class="brand-name">Aurorra Parfumerie</div>
    </header>

    <div class="payment-wrapper">
        <div class="payment-card">
            
            <div class="payment-logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4H4C2.9 4 2 6.9 2 9V10H4V9C4 7.34 5.34 6 8 6H16C18.66 6 20 7.34 20 9V15H22V9C22 6.34 20.66 4 18 4H20ZM19 9H18V18H5V9H4V18H3V9H19ZM12 13H11V15H12V13ZM12 11H11V12H12V11ZM12 17H13V19H12V17ZM8 11H9V12H8V11ZM8 13H9V14H8V13Z" fill="#000000"/>
                    <path d="M4 18H20" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 7H17" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 10H22" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h2>Pembayaran Aman</h2>
            <p class="sub-text">Sistem pembayaran otomatis via DOKU. Silakan selesaikan pembayaran Anda.</p>

            <div id="error-message" class="error-box"></div>

            <!-- Ringkasan Pesanan -->
            <div id="orderSummary" class="item-summary">
                <div style="text-align:center; color:#888;">Memuat data pesanan...</div>
            </div>

            <button class="btn-doku" id="btnPay" disabled>
                <span>Bayar Sekarang</span>
            </button>
        </div>
    </div>    

    <script>
        // ==========================================
        // 1. KONFIGURASI SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. HELPER FUNCTIONS
        // ==========================================
        function formatPrice(price) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(price);
        }

        // ==========================================
        // 3. INISIALISASI HALAMAN
        // ==========================================
        async function initPaymentPage() {
            const errorBox = document.getElementById('error-message');
            const summaryDiv = document.getElementById('orderSummary');
            const btnPay = document.getElementById('btnPay');

            try {
                // A. Ambil Data dari LocalStorage
                const paymentDataRaw = localStorage.getItem('pending_payment_data');
                
                // VALIDASI TAMBAHAN: Cek apakah data kosong atau null
                if (!paymentDataRaw || paymentDataRaw === "null" || paymentDataRaw === "") {
                    errorBox.style.display = 'block';
                    errorBox.innerText = "Data pesanan hilang (Session Expired). Silakan ulangi pemesanan dari keranjang.";
                    btnPay.innerText = "Data Kosong";
                    btnPay.disabled = true;
                    return; // Stop eksekusi
                }

                let data;
                try {
                    data = JSON.parse(paymentDataRaw);
                } catch (e) {
                    throw new Error("Format data pesanan rusak.");
                }

                // VALIDASI TAMBAHAN: Cek kelengkapan objek data
                if (!data.orderId || !data.total || !data.customer) {
                    throw new Error("Data pesanan tidak lengkap (Missing Order ID, Total, atau Customer).");
                }

                // B. Ambil Session
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session || !session.access_token) {
                    throw new Error("Sesi login habis. Silakan <a href='login.html' style='color:var(--luxury-gold)'>Login Ulang</a>.");
                }

                // C. Tampilkan Ringkasan
                let html = `
                    <div class="summary-row">
                        <span>Order ID</span>
                        <span>#${data.orderId}</span>
                    </div>
                    <div class="summary-row">
                        <span>Nama Penerima</span>
                        <span>${data.customer.name}</span>
                    </div>
                    <div class="summary-row">
                        <span>Kota</span>
                        <span>${data.customer.city ? data.customer.city.toUpperCase() : '-'}</span>
                    </div>
                    <div class="summary-total">
                        <span>Total Tagihan</span>
                        <span>${formatPrice(data.total)}</span>
                    </div>
                `;
                summaryDiv.innerHTML = html;

                // D. Enable Tombol
                btnPay.disabled = false;

                // ==========================================
                // 4. EVENT LISTENER (FIXED VARIABLE NAME)
                // ==========================================
                btnPay.addEventListener("click", async () => {
                    
                    btnPay.disabled = true;
                    btnPay.innerText = "Memproses...";

                    try {
                        // 1. Simpan Order ID
                        localStorage.setItem('temp_order_id', data.orderId);

                        // 2. Refresh Session
                        const { data: refreshedSession, error: refreshError } = await supabaseClient.auth.refreshSession();
                        let tokenToUse = session.access_token;
                        let userToUse = session.user;

                        if (!refreshError && refreshedSession && refreshedSession.access_token) {
                            tokenToUse = refreshedSession.access_token;
                            userToUse = refreshedSession.user;
                        }

                        // 3. Siapkan Body Request
                        // PERBAIKAN: Pastikan key 'customer_name' dikirim sesuai yang diminta Backend
                        const requestBody = {
                            amount: parseInt(data.total),
                            order_id: data.orderId,
                            customer_name: data.customer.name, // <--- Key ini harus sama dengan di Backend
                            customer_email: userToUse.email, 
                            customer_phone: data.customer.phone || "08123456789"
                        };

                        console.log("Mengirim Request Body:", requestBody);

                        // 4. Panggil Edge Function
                        const response = await fetch(
                            "https://dikapquhusbwjccbqcsb.supabase.co/functions/v1/create-doku-payment",
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "Authorization": "Bearer " + tokenToUse
                                },
                                body: JSON.stringify(requestBody)
                            }
                        );

                        // 5. Cek Response Text dulu sebelum parse JSON
                        const responseText = await response.text();
                        console.log("Raw Response dari Supabase:", responseText);

                        let result;
                        try {
                            result = JSON.parse(responseText);
                        } catch (e) {
                            throw new Error("Server mengembalikan data tidak valid: " + responseText);
                        }

                        if (result.response?.payment_url) {
                            window.location.href = result.response.payment_url;
                        } else {
                            // Error Handling yang lebih detail
                            const errorMsg = (result.message && Array.isArray(result.message)) 
                                            ? result.message.join(", ") 
                                            : (result.error?.message || JSON.stringify(result));
                            throw new Error("Gagal pembayaran: " + errorMsg);
                        }

                    } catch (err) {
                        console.error("Payment Error:", err);
                        errorBox.style.display = "block";
                        errorBox.innerText = err.message;
                        btnPay.disabled = false;
                        btnPay.innerText = "Bayar Sekarang";
                    }
                });

            } catch (err) {
                console.error("Init Error:", err);
                errorBox.style.display = 'block';
                errorBox.innerHTML = err.message;
                document.getElementById('btnPay').innerText = "Gagal Memuat";
            }
        }

        window.onload = initPaymentPage;
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- WAJIB: Viewport agar Modal DOKU tampil benar di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran - Aurorra Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- DOKU CHECKOUT JS (Integrasi Modal/Overlay) -->
    <script src="https://sandbox.doku.com/jokul-checkout-js/v1/jokul-checkout-1.0.0.js"></script>

    <style>
        :root { 
            --luxury-gold: #d4af37; 
            --dark-bg: #0f0c15; 
            --card-bg: #1a1620; 
            --danger-color: #ff4d4d; 
        }
        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            background: rgba(15, 12, 21, 0.95); 
            border-bottom:1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        .back-link { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: color 0.3s; 
            cursor: pointer; 
        }
        .back-link:hover { color: var(--luxury-gold); }
        .brand-name { 
            font-family: 'Playfair Display', serif; 
            color: var(--luxury-gold); 
            font-size: 1.2rem; 
            font-weight: 700; 
        }
        
        .payment-wrapper { 
            flex:1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 8%; 
            position: relative; 
        }
        .payment-card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); 
            position: relative; 
            text-align: center;
        }
        
        .payment-logo { 
            width: 80px; 
            height: 80px; 
            margin: 0 auto 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #FFD700, #FDB931); 
            border-radius: 50%; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .payment-logo svg {
            width: 50%;
            height: 50%;
            fill: #000;
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            text-align: center; 
            color: var(--luxury-gold); 
            margin-bottom: 10px; 
        }
        .sub-text { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }
        
        .item-summary { 
            background: rgba(0,0,0, 0.2); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: left;
        }
        .summary-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.9rem; 
            color: #ddd; 
        }
        .summary-total { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px solid var(--luxury-gold); 
            font-weight: 700; 
            font-size: 1.1rem; 
            color: var(--luxury-gold); 
        }
        
        .btn-doku { 
            width: 100%; 
            padding: 18px; 
            background: var(--luxury-gold); 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 30px; 
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .btn-doku:hover:not(:disabled) { 
            background: #ffed4a; 
            transform: translateY(-2px);
        }
        .btn-doku:disabled { 
            background: #444; 
            cursor: not-allowed; 
            color: #888; 
            transform: none;
            box-shadow: none;
        }
        
        .error-box { 
            display:none; 
            background:rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--danger-color); 
            color:#ffcccc; 
            padding:15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: left; 
            font-size: 0.85rem;
            word-break: break-all;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <a href="checkout.html" class="back-link">
            <span>&larr;</span> Kembali
        </a>
        <div class="brand-name">Aurorra Parfumerie</div>
    </header>

    <div class="payment-wrapper">
        <div class="payment-card">
            
            <div class="payment-logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4H4C2.9 4 2 6.9 2 9V10H4V9C4 7.34 5.34 6 8 6H16C18.66 6 20 7.34 20 9V15H22V9C22 6.34 20.66 4 18 4H20ZM19 9H18V18H5V9H4V18H3V9H19ZM12 13H11V15H12V13ZM12 11H11V12H12V11ZM12 17H13V19H12V17ZM8 11H9V12H8V11ZM8 13H9V14H8V13Z" fill="#000000"/>
                    <path d="M4 18H20" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 7H17" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 10H22" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h2>Pembayaran Aman</h2>
            <p class="sub-text">Sistem pembayaran otomatis via DOKU. Silakan selesaikan pembayaran Anda.</p>

            <div id="error-message" class="error-box"></div>

            <!-- Ringkasan Pesanan -->
            <div id="orderSummary" class="item-summary">
                <div style="text-align:center; color:#888;">Memuat data pesanan...</div>
            </div>

            <button class="btn-doku" id="btnPay" disabled>
                <span>Bayar Sekarang</span>
            </button>
        </div>
    </div> 
    
     <script>
        // ==========================================
        // 1. KONFIGURASI SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. HELPER FUNCTIONS
        // ==========================================
        function formatPrice(price) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(price || 0);
        }

        // ==========================================
        // 3. INISIALISASI HALAMAN
        // ==========================================
        async function initPaymentPage() {
            const errorBox = document.getElementById('error-message');
            const summaryDiv = document.getElementById('orderSummary');
            const btnPay = document.getElementById('btnPay');

            try {
                // A. Ambil Data dari LocalStorage
                console.log("🔍 Mencoba mengambil data dari LocalStorage...");
                const paymentDataRaw = localStorage.getItem('pending_payment_data');
                
                console.log("Isi Raw LocalStorage:", paymentDataRaw);

                if (!paymentDataRaw || paymentDataRaw === "null" || paymentDataRaw === "") {
                    throw new Error("Data pesanan hilang (Session Expired). Silakan ulangi pemesanan dari keranjang.");
                }

                let data;
                try {
                    data = JSON.parse(paymentDataRaw);
                } catch (e) {
                    throw new Error("Format data pesanan rusak.");
                }

                // B. Validasi Data Minimal
                const invoiceNumber = data.invoiceNumber || data.orderId;
                const totalAmount = data.amount || data.total;

                if (!invoiceNumber) {
                    console.error("Objek Data:", data);
                    throw new Error("Data pesanan tidak lengkap (Missing Order ID).");
                }
                if (!totalAmount) {
                    throw new Error("Data pesanan tidak lengkap (Missing Total).");
                }
                if (!data.customerName) {
                    throw new Error("Data pesanan tidak lengkap (Missing Customer).");
                }

                // C. Ambil Session User
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session || !session.access_token) {
                    throw new Error("Sesi login habis. Silakan <a href='login.html' style='color:var(--luxury-gold)'>Login Ulang</a>.");
                }

                // D. Tampilkan Ringkasan (UI Only)
                const displayAddress = data.customerAddress || (data.customer ? `${data.customer.address}, ${data.customer.city}` : '-');

                let html = `
                    <div class="summary-row">
                        <span>Order ID</span>
                        <span>#${invoiceNumber}</span>
                    </div>
                    <div class="summary-row">
                        <span>Nama Penerima</span>
                        <span>${data.customerName}</span>
                    </div>
                    <div class="summary-row">
                        <span>Kota</span>
                        <span>${data.kota || (data.customer ? data.customer.city : '-')}</span>
                    </div>
                    <div class="summary-row">
                        <span>Ekspedisi</span>
                        <span>${data.ekspedisi || '-'}</span>
                    </div>
                    <div class="summary-total">
                        <span>Total Tagihan</span>
                        <span>${formatPrice(totalAmount)}</span>
                    </div>
                `;
                summaryDiv.innerHTML = html;
                btnPay.disabled = false;

                // ==========================================
                // 4. EVENT LISTENER (MENGGUNAKAN MODAL DOKU)
                // ==========================================
                btnPay.addEventListener("click", async () => {
                    
                    btnPay.disabled = true;
                    const btnSpan = btnPay.querySelector('span');
                    const originalBtnText = btnSpan ? btnSpan.innerText : "Bayar Sekarang";
                    
                    if (btnSpan) btnSpan.innerText = "Memproses...";
                    errorBox.style.display = 'none';

                    try {
                        // 1. Refresh Session (Perbaikan Akses Token)
                        const { data: refreshedSession, error: refreshError } = await supabaseClient.auth.refreshSession();
                        
                        let tokenToUse = session.access_token;
                        let userToUse = session.user;

                        // Perbaikan: Akses token melalui .session
                        if (!refreshError && refreshedSession && refreshedSession.session) {
                            tokenToUse = refreshedSession.session.access_token;
                            userToUse = refreshedSession.session.user;
                        }

                        // 2. Siapkan Body Request
                        const requestBody = {
                            amount: parseInt(totalAmount),
                            invoiceNumber: invoiceNumber,
                            customerName: data.customerName,
                            customerEmail: userToUse.email || data.customerEmail || "customer@example.com",
                            customerPhone: data.customerPhone || "08123456789",
                            customerAddress: displayAddress,
                            items: data.items,
                            userId: userToUse.id, 
                            shippingCost: data.shippingCost || 0, 
                            ekspedisi: data.ekspedisi,
                            estimasi: data.estimasi,
                            kota: data.kota
                        };

                        console.log("📤 Mengirim Request ke Edge Function:", requestBody);

                        // 3. Panggil Edge Function
                        const functionName = 'create-payment'; 
                        const response = await fetch(
                            `${SUPABASE_URL}/functions/v1/${functionName}`,
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "Authorization": `Bearer ${tokenToUse}`,
                                    "apikey": SUPABASE_KEY 
                                },
                                body: JSON.stringify(requestBody)
                            }
                        );

                        const responseText = await response.text();
                        console.log("📥 Raw Response dari Supabase:", responseText);

                        if (!response.ok) {
                            throw new Error(`Server Error (${response.status}): ${responseText}`);
                        }

                        let result;
                        try {
                            result = JSON.parse(responseText);
                        } catch (e) {
                            throw new Error("Response server bukan format JSON yang valid: " + responseText);
                        }

                        // 4. Cari URL Pembayaran (Perbaikan Urutan Pengecekan)
                        let paymentUrl = null;

                        // Cek path umum DOKU terlebih dahulu
                        if (result.payment && result.payment.url) {
                            paymentUrl = result.payment.url;
                        } 
                        else if (result.paymentUrl) {
                            paymentUrl = result.paymentUrl;
                        } 
                        else if (result.response && result.response.payment_url) {
                            paymentUrl = result.response.payment_url;
                        } 
                        else if (result.data && result.data.payment_url) {
                            paymentUrl = result.data.payment_url;
                        }

                        if (paymentUrl) {
                            console.log("✅ Membuka Modal DOKU:", paymentUrl);
                            
                            // Hapus local storage agar tidak bayar 2x
                            localStorage.removeItem('pending_payment_data');

                            // Panggil Modal DOKU dengan delay kecil
                            setTimeout(() => {
                                if (typeof loadJokulCheckout === 'function') {
                                    loadJokulCheckout(paymentUrl);
                                } else {
                                    console.warn("DOKU JS belum termuat, menggunakan redirect standar.");
                                    window.location.href = paymentUrl;
                                }
                            }, 300); // Delay 300ms agar script siap

                        } else {
                            const errorMsg = result.message || result.error || "URL Pembayaran tidak ditemukan dalam response.";
                            throw new Error("Gagal mendapatkan Payment URL. Detail: " + JSON.stringify(result));
                        }

                    } catch (err) {
                        console.error("❌ Payment Process Error:", err);
                        errorBox.style.display = "block";
                        errorBox.innerText = err.message;
                        
                        btnPay.disabled = false;
                        if (btnSpan) btnSpan.innerText = originalBtnText;
                    }
                });

            } catch (err) {
                console.error("Init Error:", err);
                errorBox.style.display = 'block';
                errorBox.innerHTML = err.message;
                const btnSpan = document.getElementById('btnPay').querySelector('span');
                if(btnSpan) btnSpan.innerText = "Gagal Memuat";
            }
        }

        // Jalankan saat halaman dimuat
        window.onload = initPaymentPage;
    </script>
    
</body>
</html>

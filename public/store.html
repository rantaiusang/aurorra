<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koleksi Aurorra - Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --luxury-gold: #d4af37;
            --dark-bg: #0f0c15;
            --card-bg: #161216;
            --panel-bg: #1a1620;
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--dark-bg);
            color: #f0f0f0;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            background: rgba(15, 12, 21, 0.98); 
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 4%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .back-link { color: #fff; text-decoration: none; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .back-link:hover { color: var(--luxury-gold); }
        .user-menu-container { position: relative; }
        .user-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 12px; border-radius: 20px; background: rgba(255,255,255,0.03); }
        .user-avatar { width: 30px; height: 30px; background: var(--luxury-gold); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 0.8rem; }
        .dropdown-menu { position: absolute; top: 120%; right: 0; width: 200px; background: #222; border: 1px solid var(--glass-border); border-radius: 8px; display: none; flex-direction: column; overflow: hidden; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 12px 20px; color: #ccc; font-size: 0.9rem; cursor: pointer; }
        .dropdown-item:hover { background: var(--luxury-gold); color: #000; }
        .dropdown-item.logout { color: #ff6b6b; }
        .dropdown-item.logout:hover { background: #ff6b6b; color: #fff; }

        /* --- LAYOUT --- */
        .main-layout { padding: 20px 4%; max-width: 1400px; margin: 0 auto; }
        
        /* --- CATALOG --- */
        .store-header { text-align: center; margin-bottom: 20px; padding-top: 10px; }
        .store-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--luxury-gold); margin: 0; }
        
        .controls-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .search-input { width: 100%; max-width: 400px; padding: 10px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; color: #fff; font-size: 0.9rem; outline: none; }
        .search-input:focus { border-color: var(--luxury-gold); }
        
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; width: 100%; justify-content: center; }
        .filter-btn { padding: 6px 16px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #aaa; border-radius: 20px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; transition: 0.2s; }
        .filter-btn.active { background: var(--luxury-gold); color: #000; border-color: var(--luxury-gold); }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Desktop: 4 kolom */
            gap: 15px;
        }

        /* --- RESPONSIVE: MOBILE 2 GRID (Ide Anda) --- */
        @media (max-width: 768px) {
            .product-grid { 
                grid-template-columns: repeat(2, 1fr); /* Mobile: 2 kolom */
                gap: 10px; 
            }
            /* Optimasi ruang untuk mobile */
            .product-info { padding: 10px; }
            .product-name { font-size: 0.85rem; }
            .product-price { font-size: 0.9rem; }
            .product-img-wrapper { height: 140px; } /* Sesuaikan tinggi gambar */
            .btn-buy { padding: 6px; font-size: 0.65rem; }
            
            /* Sembunyikan elemen kurang penting di grid mobile untuk hemat ruang */
            .product-rating .rating-score, 
            .product-rating .sold-count { display: none; }
        }

        /* --- PRODUCT CARD --- */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer; /* Menunjukkan bisa diklik */
        }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-color: rgba(212, 175, 55, 0.3); }
        
        .category-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #fff; padding: 3px 8px; font-size: 0.6rem; border-radius: 4px; z-index: 2; backdrop-filter: blur(4px); }
        
        .product-img-wrapper { width: 100%; height: 180px; background: #000; overflow: hidden; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; opacity: 0.9; }
        .product-card:hover .product-img { transform: scale(1.05); }

        .product-info { padding: 12px; display: flex; flex-direction: column; flex: 1; }
        .product-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: #fff; margin-bottom: 4px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Rating Stars */
        .product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; font-size: 0.7rem; }
        .stars { color: var(--luxury-gold); letter-spacing: 1px; }
        .rating-score { color: #aaa; }
        .sold-count { color: #666; margin-left: auto; }

        .product-price { font-size: 0.95rem; color: var(--luxury-gold); font-weight: 700; margin-bottom: 8px; display: block; }
        
        .btn-buy {
            width: 100%; padding: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 500;
            transition: 0.2s; text-transform: uppercase; margin-top: auto;
        }
        .btn-buy:hover:not(:disabled) { background: var(--luxury-gold); color: #000; border-color: var(--luxury-gold); }
        .btn-buy:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Price Blur */
        .price-blurred { filter: blur(4px); user-select: none; pointer-events: none; }

        /* --- QUICK VIEW MODAL (Pop Up Deskripsi) --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 10px; backdrop-filter: blur(5px); }
        .modal-overlay.show { display: flex; }
        
        .quick-view-content {
            background: var(--panel-bg); width: 100%; max-width: 450px;
            border-radius: 12px; border: 1px solid var(--glass-border);
            overflow: hidden; display: flex; flex-direction: column;
            max-height: 90vh; animation: slideUp 0.3s ease-out; position: relative;
        }
        
        .quick-view-img { width: 100%; height: 250px; object-fit: cover; }
        .quick-view-body { padding: 20px; overflow-y: auto; text-align: left; }
        .quick-view-title { font-family: 'Playfair Display'; font-size: 1.4rem; color: #fff; margin-bottom: 5px; }
        .quick-view-desc { font-size: 0.9rem; color: #aaa; line-height: 1.6; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .quick-view-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .meta-item span { display: block; font-size: 0.7rem; color: #666; }
        .meta-item strong { font-size: 1rem; color: #fff; }
        
        .close-modal-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }

        /* --- FLOATING CART --- */
        #floating-cart { position: fixed; bottom: 20px; right: 20px; background: var(--luxury-gold); color: #000; padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; gap: 8px; }
        
        /* --- UTILS --- */
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .toast { background: #222; border: 1px solid var(--luxury-gold); color: #fff; padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; animation: slideUp 0.3s; font-size: 0.85rem; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Back</a>
        <nav id="navContainer">
            <div class="user-btn" onclick="window.location='login.html'">
                <div class="user-avatar">G</div>
                <span>Guest</span>
            </div>
        </nav>
    </header>

    <main class="main-layout">
        <section class="catalog-section">
            <div class="store-header">
                <h1>Exklusive Collection</h1>
            </div>

            <div class="controls-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="Cari parfum...">
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" data-category="all">Semua</button>
                <button class="filter-btn" data-category="women">Women</button>
                <button class="filter-btn" data-category="men">Men</button>
                <button class="filter-btn" data-category="unisex">Unisex</button>
            </div>

            <div class="product-grid" id="productGrid">
                <p style="text-align:center; grid-column:1/-1; color:#555;">Memuat...</p>
            </div>
        </section>
    </main>

    <!-- QUICK VIEW MODAL -->
    <div class="modal-overlay" id="quickViewModal">
        <div class="quick-view-content">
            <button class="close-modal-btn" onclick="closeQuickView()">&times;</button>
            <img src="" id="qvImage" class="quick-view-img" alt="Product Image">
            <div class="quick-view-body">
                <h2 class="quick-view-title" id="qvName">Product Name</h2>
                <div class="product-rating" style="margin-bottom:15px;">
                    <span class="stars" id="qvStars">★★★★★</span>
                    <span class="rating-score" id="qvRating">5.0</span>
                    <span class="sold-count" id="qvSold">(Terjual 10)</span>
                </div>
                <div class="quick-view-desc" id="qvDesc">Deskripsi produk...</div>
                
                <div class="quick-view-meta">
                    <div class="meta-item">
                        <span>Harga</span>
                        <strong id="qvPrice" style="color:var(--luxury-gold); font-size:1.2rem;">Rp 0</strong>
                    </div>
                    <div class="meta-item">
                        <span>Stok Tersedia</span>
                        <strong id="qvStock">0</strong>
                    </div>
                </div>

                <button class="btn-buy" id="qvBuyBtn" style="margin-top:0; width:100%;">Beli Sekarang</button>
            </div>
        </div>
    </div>

    <div id="floating-cart" onclick="StoreApp.cart.checkout()">
        🛒 <span id="cart-count-float">0</span>
    </div>
    <div id="toast-container"></div>

    <script>
        const APP = {
            SUPABASE_URL: 'https://dikapquhusbwjccbqcsb.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA',
            sb: null,
            state: { products: [], user: null, cart: [] },

            async init() {
                this.sb = supabase.createClient(this.SUPABASE_URL, this.SUPABASE_KEY);
                this.loadCart();
                await this.checkAuth();
                await this.loadProducts();
                this.listenEvents();
            },

            async checkAuth() {
                const { data: { user } } = await this.sb.auth.getUser();
                this.state.user = user;
                this.renderNav();
            },

            renderNav() {
                const nav = document.getElementById('navContainer');
                if (this.state.user) {
                    const name = this.state.user.user_metadata?.full_name || this.state.user.email.split('@')[0];
                    nav.innerHTML = `
                        <div class="user-menu-container">
                            <div class="user-btn" onclick="toggleMenu()">
                                <div class="user-avatar">${name.charAt(0).toUpperCase()}</div>
                                <span>${name}</span>
                                <span style="font-size:0.6rem; color:#888;">▼</span>
                            </div>
                            <div class="dropdown-menu" id="dropMenu">
                                <div class="dropdown-item" onclick="window.location='rewards.html'">Rewards</div>
                                <div class="dropdown-item logout" onclick="APP.logout()">Logout</div>
                            </div>
                        </div>`;
                } else {
                    nav.innerHTML = `<div class="user-btn" onclick="window.location='login.html'"><div class="user-avatar" style="background:#333">G</div><span>Guest</span></div>`;
                }
            },

            async loadProducts() {
                const { data, error } = await this.sb.from('products').select('*').order('id', { ascending: false });
                if (error) return console.error(error);
                this.state.products = data || [];
                this.renderGrid();
            },

            renderGrid() {
                const grid = document.getElementById('productGrid');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const catBtn = document.querySelector('.filter-btn.active');
                const cat = catBtn ? catBtn.dataset.category : 'all';

                const filtered = this.state.products.filter(p => {
                    const matchCat = (cat === 'all' || (p.category && p.category.toLowerCase() === cat));
                    const matchSearch = (p.name.toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search));
                    return matchCat && matchSearch;
                });

                grid.innerHTML = '';
                
                if (filtered.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:#666;">Tidak ada produk.</p>';
                    return;
                }

                filtered.forEach(p => {
                    const rating = (Math.random() * (5 - 4.5) + 4.5).toFixed(1); 
                    const sold = Math.floor(Math.random() * 50) + 5; 
                    const isBlur = !this.state.user;

                    const card = document.createElement('div');
                    card.className = 'product-card';
                    // Klik card = buka modal
                    card.onclick = () => this.openQuickView(p);
                    
                    card.innerHTML = `
                        <div class="category-badge">${p.category || 'General'}</div>
                        <div class="product-img-wrapper">
                            <img src="${p.image_url || 'https://via.placeholder.com/300'}" class="product-img" alt="${p.name}">
                        </div>
                        <div class="product-info">
                            <div>
                                <h3 class="product-name">${p.name}</h3>
                                <div class="product-rating">
                                    <span class="stars">★★★★★</span>
                                    <span class="rating-score">${rating}</span>
                                    <span class="sold-count">Terjual ${sold}</span>
                                </div>
                                <div class="product-price ${isBlur ? 'price-blurred' : ''}">
                                    ${isBlur ? 'Login' : this.formatPrice(p.price)}
                                </div>
                            </div>
                            <button class="btn-buy" onclick="event.stopPropagation(); APP.addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''}>
                                ${p.stock > 0 ? 'Beli' : 'Habis'}
                            </button>
                        </div>`;
                    grid.appendChild(card);
                });
            },

            // Fungsi Buka Modal Deskripsi
            openQuickView(product) {
                const modal = document.getElementById('quickViewModal');
                const isBlur = !this.state.user;
                
                document.getElementById('qvImage').src = product.image_url || 'https://via.placeholder.com/300';
                document.getElementById('qvName').innerText = product.name;
                document.getElementById('qvDesc').innerText = product.description || 'Tidak ada deskripsi tersedia.';
                document.getElementById('qvPrice').innerText = isBlur ? 'Login untuk harga' : this.formatPrice(product.price);
                document.getElementById('qvStock').innerText = product.stock || 0;
                document.getElementById('qvPrice').style.filter = isBlur ? 'blur(4px)' : 'none';
                
                const buyBtn = document.getElementById('qvBuyBtn');
                buyBtn.disabled = product.stock <= 0;
                buyBtn.innerText = product.stock > 0 ? 'Beli Sekarang' : 'Stok Habis';
                buyBtn.onclick = (e) => { e.stopPropagation(); this.addToCart(product.id); closeQuickView(); };

                modal.classList.add('show');
            },

            addToCart(id) {
                if(!this.state.user) {
                    this.toast("Silakan login dulu");
                    setTimeout(() => window.location.href='login.html', 800);
                    return;
                }
                const product = this.state.products.find(p => p.id == id);
                if(!product || product.stock <= 0) return;

                let cart = JSON.parse(localStorage.getItem('aurora_cart')) || [];
                const idx = cart.findIndex(i => i.id == id);
                if(idx >= 0) {
                    if(cart[idx].qty + 1 > product.stock) return this.toast("Stok tidak cukup");
                    cart[idx].qty++;
                } else {
                    cart.push({ id: product.id, name: product.name, price: product.price, image_url: product.image_url, qty: 1 });
                }
                localStorage.setItem('aurora_cart', JSON.stringify(cart));
                this.loadCart();
                this.toast("Ditambahkan ke keranjang");
            },

            loadCart() {
                const cart = JSON.parse(localStorage.getItem('aurora_cart')) || [];
                const count = cart.reduce((sum, i) => sum + i.qty, 0);
                document.getElementById('cart-count-float').innerText = count;
                document.getElementById('floating-cart').style.display = count > 0 ? 'flex' : 'none';
            },

            cart: {
                checkout() {
                    if(!APP.state.user) return window.location.href='login.html';
                    const cart = JSON.parse(localStorage.getItem('aurora_cart')) || [];
                    if(cart.length == 0) return APP.toast("Keranjang kosong");
                    
                    let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
                    localStorage.setItem('aurora_checkout', JSON.stringify({ items: cart, total: total }));
                    window.location.href = 'checkout.html';
                }
            },

            logout() {
                this.sb.auth.signOut();
                localStorage.clear();
                window.location.reload();
            },

            toast(msg) {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast'; t.innerText = msg;
                c.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            },

            listenEvents() {
                document.getElementById('searchInput').oninput = () => this.renderGrid();
                document.querySelector('.filter-bar').onclick = (e) => {
                    if(e.target.classList.contains('filter-btn')) {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.renderGrid();
                    }
                }
            },
            
            formatPrice(n) { return new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR', minimumFractionDigits:0}).format(n); }
        };

        function toggleMenu() { document.getElementById('dropMenu').classList.toggle('show'); }
        function closeQuickView() { document.getElementById('quickViewModal').classList.remove('show'); }
        document.getElementById('quickViewModal').onclick = function(e) { if(e.target === this) closeQuickView(); }

        window.onload = () => APP.init();
    </script>
</body>
</html>

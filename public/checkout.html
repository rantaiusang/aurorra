<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran - Aurorra Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --luxury-gold: #d4af37; 
            --dark-bg: #0f0c15; 
            --card-bg: #1a1620; 
            --danger-color: #ff4d4d; 
            --success-color: #2ecc71;
        }
        
        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .payment-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Animasi Loading */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-left-color: var(--luxury-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-text {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 5px;
        }

        .detail-text {
            font-size: 0.9rem;
            color: #888;
            max-width: 80%;
        }

        /* Tampilan Error */
        .error-view {
            display: none;
            color: var(--danger-color);
        }
        .error-icon { font-size: 3rem; margin-bottom: 15px; display: block; }

        /* Tombol Kembali */
        .btn-back {
            margin-top: 30px;
            padding: 12px 25px;
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            border-color: var(--luxury-gold);
            color: var(--luxury-gold);
        }

        /* Log Supabase (Optional, for debug) */
        #log-area {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            display: none; /* Set 'block' untuk debug */
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <!-- TAMPILAN LOADING -->
        <div id="loadingView" class="loader-container">
            <div class="spinner"></div>
            <h3 class="status-text" id="statusTitle">Menyiapkan Pembayaran...</h3>
            <p class="detail-text" id="statusDetail">Mohon tunggu sebentar, jangan tutup halaman ini.</p>
        </div>

        <!-- TAMPILAN ERROR -->
        <div id="errorView" class="error-view">
            <span class="error-icon">⚠️</span>
            <h3>Terjadi Kesalahan</h3>
            <p id="errorMsg">Gagal memproses pembayaran.</p>
            <a href="store.html" class="btn-back">Kembali ke Toko</a>
        </div>
        
        <!-- Area Log Debug -->
        <div id="log-area"></div>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURASI SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Helper Log
        function log(msg) {
            const logArea = document.getElementById('log-area');
            if(logArea) {
                logArea.innerHTML += `> ${msg}<br>`;
                logArea.scrollTop = logArea.scrollHeight;
            }
            console.log(msg);
        }

        function updateStatus(title, detail) {
            document.getElementById('statusTitle').innerText = title;
            if(detail) document.getElementById('statusDetail').innerText = detail;
        }

        function showError(msg) {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('errorView').style.display = 'block';
            document.getElementById('errorMsg').innerText = msg;
        }

        // ==========================================
        // 2. LOGIKA UTAMA PEMBAYARAN
        // ==========================================
        async function initPaymentProcess() {
            try {
                // STEP 1: Ambil Data dari LocalStorage (dikirim dari checkout.html)
                const paymentDataStr = localStorage.getItem('pending_payment_data');
                if (!paymentDataStr) throw new Error("Data pembayaran tidak ditemukan. Silakan ulangi pesanan.");
                
                const paymentData = JSON.parse(paymentDataStr);
                log("Data payload loaded: " + JSON.stringify(paymentData));

                // Pastikan user masih login (Security Check)
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                if (authError || !user) throw new Error("Sesi login habis. Silakan login ulang.");

                updateStatus("Membuat Pesanan...", "Menyimpan data pesanan ke database.");

                // STEP 2: Simpan Order ke Database Supabase (Status: PENDING)
                // Kita simpan dulu sebelum bayar, agar ada catatan di admin panel
                const { data: orderData, error: insertError } = await supabaseClient
                    .from('orders')
                    .insert([{
                        order_id: paymentData.orderId,
                        user_id: user.id,
                        customer_name: paymentData.customer.name,
                        customer_phone: paymentData.customer.phone,
                        customer_address: `${paymentData.customer.address}, ${paymentData.customer.city}`,
                        total_amount: paymentData.total,
                        items: paymentData.items, // Simpan JSON item
                        payment_method: 'DOKU',
                        status: 'pending', // Status awal
                        shipping_cost: paymentData.shippingCost
                    }])
                    .select()
                    .single();

                if (insertError) {
                    log("Insert DB Error: " + JSON.stringify(insertError));
                    throw new Error("Gagal menyimpan pesanan: " + insertError.message);
                }

                log("Order Created ID: " + orderData.id);

                // STEP 3: Panggil Supabase Edge Function untuk DOKU
                updateStatus("Menghubungi Payment Gateway...", "Meng生成 instruksi pembayaran aman.");

                const { data: dokuResponse, error: functionError } = await supabaseClient.functions.invoke('doku-payment', {
                    body: {
                        amount: paymentData.total,
                        orderId: paymentData.orderId,
                        customerName: paymentData.customer.name,
                        customerEmail: user.email || "customer@aurorra.com",
                        customerPhone: paymentData.customer.phone
                    }
                });

                if (functionError) {
                    log("Edge Function Error: " + JSON.stringify(functionError));
                    throw new Error("Gagal memproses pembayaran gateway: " + functionError.message);
                }

                log("DOKU Response Received");

                // STEP 4: Cek apakah mendapatkan Payment URL
                if (dokuResponse && dokuResponse.payment_url) {
                    // Update status order menjadi 'processing' (sedang dalam proses pembayaran di halaman eksternal)
                    await supabaseClient
                        .from('orders')
                        .update({ status: 'processing' })
                        .eq('id', orderData.id);

                    log("Redirecting to: " + dokuResponse.payment_url);
                    
                    // Bersihkan local storage agar data tidak tersisa
                    localStorage.removeItem('aurora_checkout');
                    localStorage.removeItem('pending_payment_data');

                    // STEP 5: Redirect User ke Halaman Pembayaran DOKU
                    window.location.href = dokuResponse.payment_url;

                } else {
                    throw new Error("URL Pembayaran tidak diterima dari sistem.");
                }

            } catch (err) {
                console.error(err);
                log("CRITICAL ERROR: " + err.message);
                showError(err.message);
            }
        }

        // Jalankan saat halaman dimuat
        window.addEventListener('DOMContentLoaded', initPaymentProcess);

    </script>
</body>
</html>

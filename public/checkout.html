<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran - Aurorra Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS (Ditambahkan untuk cek Auth & Load Ongkir) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <!-- Config File (Pastikan file ini ada dan berisi ENDPOINT & KEYS) -->
    <script src="./pi-config.js"></script>

    <style>
        :root { 
            --luxury-gold: #d4af37; 
            --dark-bg: #0f0c15; 
            --card-bg: #1a1620; 
            --danger-color: #ff4d4d; 
            --info-color: #3498db; 
        }
        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            background: rgba(15, 12, 21, 0.95); 
            border-bottom:1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        .back-link { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: color 0.3s; 
            cursor: pointer; 
        }
        .back-link:hover { color: var(--luxury-gold); }
        .brand-name { 
            font-family: 'Playfair Display', serif; 
            color: var(--luxury-gold); 
            font-size: 1.2rem; 
            font-weight: 700; 
        }
        
        .payment-wrapper { 
            flex:1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 8%; 
            position: relative; 
        }
        .payment-card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); 
            position: relative; 
        }
        .coin-visual { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            margin: 0 auto 30px; 
            background: linear-gradient(135deg, var(--luxury-gold), #b8860b); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 2rem; 
            color: white; 
            font-weight: bold; 
        }
        h2 { 
            font-family: 'Playfair Display', serif; 
            text-align: center; 
            color: var(--luxury-gold); 
            margin-bottom: 10px; 
        }
        .sub-text { text-align: center; color: #aaa; margin-bottom: 25px; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #ccc; font-size: 0.9rem; }
        .input-box, textarea.input-box, select.input-box { 
            width: 100%; 
            padding: 12px 14px; 
            background: rgba(255,255,255, 0.05); 
            border: 1px solid rgba(255,255,255, 0.1); 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif;
            resize: vertical;
        }
        .input-box:focus, textarea.input-box:focus, select.input-box:focus { 
            outline: none; 
            border-color: var(--luxury-gold); 
        }

        .item-summary { 
            background: rgba(0,0,0, 0.2); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.05); 
            max-height: 200px;
            overflow-y: auto;
        }
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 8px; 
            font-size: 0.9rem; 
            color: #ddd; 
        }
        .total-display { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 30px; 
            padding: 20px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 10px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
        }
        .total-amount { 
            font-size: 1.5rem; 
            color: var(--luxury-gold); 
            font-weight: 700; 
        }
        
        .btn-pay { 
            width: 100%; 
            padding: 18px; 
            background: var(--luxury-gold); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: background 0.3s;
        }
        .btn-pay:hover:not(:disabled) { 
            background: #ffed4a; 
            transform: translateY(-2px);
        }
        .btn-pay:disabled { 
            background: #444; 
            cursor: not-allowed; 
            color: #888; 
            transform: none;
        }
        
        .error-box { 
            display:none; 
            background:rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--danger-color); 
            color:#ffcccc; 
            padding:15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: center; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="store.html" class="back-link">
            <span>&larr;</span> Kembali
        </a>
        <div class="brand-name">Aurorra Parfumerie</div>
    </header>

    <div class="payment-wrapper">
        <div class="payment-card">
            <div class="coin-visual">π</div>

            <h2>Pembayaran Aman</h2>
            <p class="sub-text">Sistem pembayaran otomatis via Pi Network. Pastikan Anda menggunakan Pi Browser.</p>

            <div id="error-message" class="error-box"></div>

            <form id="paymentForm" onsubmit="handleAutoPayment(event)">
                <div class="form-group">
                    <label for="fullName">Nama Lengkap</label>
                    <input type="text" id="fullName" class="input-box" placeholder="Nama Penerima" required>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Nomor WhatsApp</label>
                    <input type="tel" id="phoneNumber" class="input-box" placeholder="0812..." required>
                </div>
                
                <!-- DROPDOWN KOTA (LANGKAH 1) -->
                <div class="form-group">
                    <label for="city">Kota Tujuan</label>
                    <select id="city" class="input-box" required>
                        <option value="">Pilih Kota</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">Alamat Pengiriman</label>
                    <textarea id="address" class="input-box" rows="2" placeholder="Jalan, No Rumah, Kecamatan, Kota..." required></textarea>
                </div>

                <!-- DISPLAY ONGKIR (LANGKAH 1) -->
                <div class="form-group">
                    <label>Ongkir (JNE)</label>
                    <input type="text" id="shippingCostDisplay" class="input-box" readonly value="Rp 0">
                </div>

                <div class="item-summary">
                    <div id="summaryList">
                        <!-- Daftar item akan dirender di sini via JS -->
                        <div style="text-align:center; color:#888;">Memuat ringkasan...</div>
                    </div>
                </div>

                <div class="total-display">
                    <span>Total Tagihan</span>
                    <span class="total-amount" id="displayTotal">Rp 0</span>
                </div>

                <button type="submit" class="btn-pay" id="payBtn" disabled>Bayar Sekarang</button>
            </form>
        </div>
    </div>    

        <script>
        // ==========================================
        // 1. KONFIGURASI SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. HELPER FUNCTIONS (FORMAT RUPIAH)
        // ==========================================
        function cleanPrice(priceInput) {
            if (priceInput === null || priceInput === undefined) return 0;
            let p = String(priceInput).replace(/[^0-9.-]+/g, "");
            if (p.length === 0) return 0;
            let val = parseFloat(p);
            return isNaN(val) || val < 0 ? 0 : val;
        }

        function formatPrice(price) {
            let numPrice = cleanPrice(price);
            
            // Menggunakan Intl.NumberFormat untuk format Rupiah Indonesia yang benar
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(numPrice);
        }

        // --- 3. SETUP PEMBAYARAN PI ---
        const PI_SUPABASE_URL = "https://dikapquhusbwjccbqcsb.supabase.co/functions/v1/verify-pi-payment";

        let currentTotal = 0;
        let shippingCost = 0; // VARIABLE ONGKIR (LANGKAH 2)
        let cartItems = [];
        let currentUser = null;
        let orderId = "ORD-" + Date.now();

        // --- 4. FUNGSI LOAD KOTA (LANGKAH 3) ---
        async function loadCities() {
            try {
                const { data, error } = await supabaseClient
                    .from("ongkir")
                    .select("tujuan")
                    .eq("ekspedisi", "jne");

                if (error || !data) return;

                const citySelect = document.getElementById("city");
                
                // Ambil kota unik saja
                const uniqueCities = [...new Set(data.map(item => item.tujuan))];

                uniqueCities.forEach(city => {
                    citySelect.innerHTML += `<option value="${city}">${city.toUpperCase()}</option>`;
                });
            } catch (e) {
                console.error("Gagal load kota:", e);
            }
        }

        // --- 5. FUNGSI AMBIL ONGKIR (LANGKAH 4) ---
        async function loadShippingCost() {
            const city = document.getElementById("city").value;
            if (!city) {
                shippingCost = 0;
                document.getElementById("shippingCostDisplay").value = formatPrice(0);
                updateFinalTotal();
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from("ongkir")
                    .select("tarif")
                    .eq("tujuan", city)
                    .eq("ekspedisi", "jne")
                    .single();

                if (data) {
                    shippingCost = parseInt(data.tarif) || 0;
                    document.getElementById("shippingCostDisplay").value = formatPrice(shippingCost);
                    updateFinalTotal();
                }
            } catch (e) {
                console.error("Gagal ambil ongkir:", e);
            }
        }

        // --- 6. FUNGSI UPDATE TOTAL (LANGKAH 5) ---
        function updateFinalTotal() {
            const finalTotal = currentTotal + shippingCost;
            document.getElementById('displayTotal').innerText = formatPrice(finalTotal);
        }

        // --- 7. INISIALISASI UTAMA ---
        async function initPayment() {
            const payBtn = document.getElementById('payBtn');
            const errorBox = document.getElementById('error-message');
            
            try {
                // A. Cek Pi SDK
                if (typeof Pi === 'undefined') {
                    throw new Error("Pi SDK tidak ditemukan. Harap gunakan Pi Browser.");
                }
                await Pi.init({ version: "2.0", sandbox: true });

                // B. CEK AUTH SUPABASE
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();

                if (authError || !user) {
                    console.warn("Session Invalid/Logout Terdeteksi. Menghapus data checkout...");
                    localStorage.removeItem('aurora_checkout');
                    localStorage.removeItem('aurora_cart');
                    localStorage.removeItem('aurora_user');
                    throw new Error("Sesi habis atau Anda telah logout. Silakan login ulang.");
                }

                currentUser = user;

                // C. Load Data Keranjang
                const successLoad = loadCartAndCalculateTotal();

                // D. Load Kota & Event Listener (LANGKAH 6)
                await loadCities();
                document.getElementById("city").addEventListener("change", loadShippingCost);

                // E. Update UI
                if (successLoad && parseFloat(currentTotal) > 0) {
                    payBtn.disabled = false;
                    payBtn.innerText = "Bayar Sekarang";
                } else {
                    payBtn.innerText = "Data Tidak Valid";
                    payBtn.disabled = true;
                    errorBox.style.display = "block";
                    errorBox.innerHTML = "Data checkout tidak ditemukan atau total 0.<br><a href='store.html' style='color:var(--luxury-gold); font-weight:bold; text-decoration:underline;'>Kembali ke Toko</a>";
                }

            } catch (err) {
                console.error("Init Error:", err);
                errorBox.style.display = "block";
                errorBox.innerText = err.message;
                payBtn.innerText = "Gagal Memuat";
            }
        }

        // Fungsi Khusus: Membaca & Menghitung Total dari LocalStorage
        function loadCartAndCalculateTotal() {
            const checkoutRaw = localStorage.getItem('aurora_checkout');
            
            if (!checkoutRaw) {
                document.getElementById('summaryList').innerHTML = "<div style='color:#ff4d4d; text-align:center; padding:10px;'>Data pesanan hilang.<br>Silakan pilih produk ulang.</div>";
                return false;
            }

            try {
                const checkout = JSON.parse(checkoutRaw);
                cartItems = checkout.items || []; 
                
                const summaryList = document.getElementById('summaryList');
                let html = '';
                let total = 0;

                if (cartItems.length === 0) {
                     summaryList.innerHTML = "<div style='text-align:center; color:#888;'>Keranjang kosong.</div>";
                     return false;
                }

                cartItems.forEach(item => {
                    const name = item.name || item.product_name || "Produk Tanpa Nama";
                    const price = parseFloat(item.price) || 0;
                    const qty = parseInt(item.qty) || 1;
                    const subtotal = price * qty;
                    
                    total += subtotal;
                    
                    html += `
                        <div class="item-row">
                            <span>${name} <small style="color:#888;">(x${qty})</small></span>
                            <span>${formatPrice(subtotal)}</span>
                        </div>`;
                });

                summaryList.innerHTML = html;
                currentTotal = total;
                // Panggil updateFinalTotal agar total awal ter-render (walaupun ongkir masih 0)
                updateFinalTotal();
                return true;

            } catch (e) {
                console.error("Gagal parse cart data:", e);
                return false;
            }
        }

        // --- 8. PROSES PEMBAYARAN UTAMA ---
        async function handleAutoPayment(event) {
            event.preventDefault();
            const payBtn = document.getElementById('payBtn');
            const errorBox = document.getElementById('error-message');
            
            // Validasi Input
            const fullName = document.getElementById('fullName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value;

            if (fullName.length < 3 || phoneNumber.length < 10 || address.length < 10) {
                return showError("Mohon lengkapi data pengiriman dengan benar.");
            }

            if (!city) {
                return showError("Mohon pilih kota tujuan.");
            }

            // Validasi Total (Barang + Ongkir)
            const finalBill = currentTotal + shippingCost;
            if (parseFloat(finalBill) <= 0) return showError("Total pembayaran tidak valid.");

            // Cek ulang auth sebelum bayar
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if (error || !user) {
                localStorage.removeItem('aurora_checkout');
                return showError("Sesi berubah. Silakan refresh halaman.");
            }

            payBtn.disabled = true;
            payBtn.innerText = "Menghubungkan ke Pi Wallet...";

            try {
                const auth = await Pi.authenticate(
                    ["payments", "username"], 
                    onIncompletePaymentFound
                );

                if (!auth || !auth.accessToken) {
                    throw new Error("Gagal otentikasi ulang dengan Pi Network.");
                }
                
                const piUser = auth.user;

                // (LANGKAH 7) Ubah amount menjadi Total + Ongkir
                const paymentData = {
                    amount: parseFloat(finalBill),
                    memo: `Order Aurora: ${orderId}`,
                    metadata: { orderId: orderId, itemsCount: cartItems.length }
                };

                await Pi.createPayment(paymentData, {
                    onReadyForServerApproval: async (paymentId) => {
                        console.log("Payment ID dibuat, meminta approval server:", paymentId);
                        try {
                            const response = await fetch(PI_SUPABASE_URL, {
                                method: 'POST',
                                headers: { 
                                    "Content-Type": "application/json",
                                    "Authorization": `Bearer ${SUPABASE_KEY}` 
                                },
                                body: JSON.stringify({ 
                                    paymentId, 
                                    action: 'approve', 
                                    orderId,
                                    uid: piUser.uid
                                })
                            });
                            if(!response.ok) throw new Error("Server Approval Failed");
                        } catch (err) {
                            console.error("Approval Error:", err);
                            throw new Error("Gagal menghubungi server pembayaran.");
                        }
                    },
                    
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        console.log("Pembayaran sukses dari user. TXID:", txid);
                        try {
                            const response = await fetch(PI_SUPABASE_URL, {
                                method: 'POST',
                                headers: { 
                                    "Content-Type": "application/json",
                                    "Authorization": `Bearer ${SUPABASE_KEY}` 
                                },
                                body: JSON.stringify({ 
                                    paymentId, 
                                    action: 'complete', 
                                    txid, 
                                    orderId,
                                    uid: piUser.uid,
                                    username: piUser.username,
                                    amount: finalBill, // Kirim final amount
                                    items: cartItems,
                                    customer: { 
                                        name: fullName, 
                                        phone: phoneNumber, 
                                        address: address,
                                        city: city, // Tambahkan kota ke data customer
                                        shippingCost: shippingCost // Info tambahan ongkir
                                    }
                                })
                            });

                            if(!response.ok) {
                                const errData = await response.json();
                                throw new Error(errData.message || "Gagal menyimpan pesanan.");
                            }

                            alert("Pembayaran Berhasil! Pesanan Anda sedang diproses.");
                            localStorage.removeItem('aurora_checkout'); 
                            localStorage.removeItem("aurora_cart");
                            window.location.href = "payment-success.html";

                        } catch (err) {
                            console.error("Completion Error:", err);
                            alert("Pembayaran tercatat di Blockchain, namun gagal menyimpan ke database kami. Hubungi admin dengan TXID: " + txid);
                        }
                    },
                    
                    onCancel: () => {
                        console.log("User membatalkan pembayaran.");
                        payBtn.disabled = false;
                        payBtn.innerText = "Bayar Sekarang";
                    },
                    
                    onError: (error) => {
                        console.error("Payment Error:", error);
                        showError("Terjadi kesalahan: " + error.message);
                        payBtn.disabled = false;
                        payBtn.innerText = "Coba Lagi";
                    }
                });

            } catch (err) {
                console.error("System Error:", err);
                showError(err.message);
                payBtn.disabled = false;
                payBtn.innerText = "Bayar Sekarang";
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Ditemukan pembayaran tidak lengkap:", payment);
            return; 
        }

        function showError(msg) {
            const errBox = document.getElementById('error-message');
            errBox.style.display = 'block';
            errBox.innerText = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = initPayment;
    </script>
</body>
</html>

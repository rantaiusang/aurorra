<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Aurorra Store</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- AURORA LUXURY THEME --- */
        :root {
            --luxury-gold: #d4af37;
            --luxury-gold-dim: rgba(212, 175, 55, 0.15);
            --dark-bg: #0f0c15;
            --dark-card: rgba(25, 23, 28, 0.98);
            --input-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.1);
            --error-red: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --success-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
        }

        h1, h2 { font-family: 'Playfair Display', serif; }

        /* --- HEADER --- */
        header {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }
        .logo {
            font-size: 1.4rem;
            color: var(--text-white);
            text-decoration: none;
            letter-spacing: 1.5px;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, var(--luxury-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- CONTAINER --- */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }
        .glow-effect {
            position: absolute; width: 350px; height: 350px;
            background: radial-gradient(circle, var(--luxury-gold-dim) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none;
            animation: pulseGlow 4s infinite ease-in-out;
        }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); } }
        
        .card {
            background: var(--dark-card); width: 100%; max-width: 400px; padding: 45px 30px;
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .spinner-wrapper { margin: 0 auto 30px; height: 70px; display: flex; align-items: center; justify-content: center; position: relative; }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--luxury-gold); border-radius: 50%; animation: spin 1s linear infinite;
        }
        .pi-icon { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--luxury-gold); position: absolute; font-weight: bold; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { font-size: 1.5rem; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px; }
        p.subtitle { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; min-height: 45px;}

        /* --- BUTTON --- */
        .btn-google {
            display: none; /* Hidden by default */
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            backdrop-filter: blur(10px);
        }
        .btn-google:hover {
            background: var(--luxury-gold);
            color: black;
            border-color: var(--luxury-gold);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        .btn-google:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-google svg { width: 20px; height: 20px; }

        .error-box { display: none; background: var(--error-bg); border: 1px solid rgba(239, 68, 68, 0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; font-size: 0.85rem; }
        .error-title { color: #fca5a5; font-weight: 600; display: block; margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .error-msg { color: #e5e7eb; word-break: break-word; }
        .spin-anim { animation: spin 1s linear infinite; }

        /* --- LIVE ACTIVITY LOG STYLING --- */
        .live-activity-log {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            min-height: 60px; /* Pastikan area tidak collapse saat kosong */
        }

        /* Elemen placeholder saat tidak ada log */
        .log-placeholder {
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeInOut 4s infinite; /* Animasi halus */
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .log-item {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 3px solid var(--success-green);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(-120%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            max-width: 300px;
            font-size: 0.8rem;
        }

        .log-item.show {
            transform: translateX(0);
            opacity: 1;
        }

        .log-item.fade-out {
            transform: translateX(-120%);
            opacity: 0;
        }

        .log-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .log-content {
            display: flex;
            flex-direction: column;
            color: #fff;
        }
        .log-name { font-weight: 600; color: var(--text-white); }
        .log-action { color: var(--text-muted); font-size: 0.75rem; }
        .log-time { color: var(--success-green); font-size: 0.7rem; margin-top: 2px; }

        /* Responsive untuk Log */
        @media (max-width: 600px) {
            .live-activity-log { left: 10px; right: 10px; bottom: 10px; align-items: center; }
            .log-item { max-width: 100%; font-size: 0.75rem; padding: 10px 15px; }
            .log-placeholder { display: none; } /* Sembunyikan placeholder di mobile jika ingin bersih */
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Aurorra ⚡</a>
    </header>

    <div class="login-container">
        <div class="glow-effect"></div>
        <div class="card">
            <div class="spinner-wrapper">
                <div class="spinner" id="main-spinner"></div>
                <div class="pi-icon">A</div>
            </div>

            <h2 id="status-title">Menghubungkan...</h2>
            <!-- PERBAIKAN 1: Subtitle dihapus untuk fokus ke tombol -->
            <p class="subtitle" id="status-desc">Menyiapkan koneksi aman</p>

            <!-- Tombol Google -->
            <button id="btn-google" class="btn-google" onclick="handleGoogleLogin()">
                <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                    <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                        <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/>
                        <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/>
                        <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.734 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.79 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/>
                        <path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/>
                    </g>
                </svg>
                Masuk dengan Google
            </button>

            <div id="error-box" class="error-box">
                <span class="error-title">Kesalahan Sistem</span>
                <span id="error-msg" class="error-msg">Deskripsi error.</span>
            </div>
        </div>
    </div>

    <!-- CONTAINER LOG -->
    <div class="live-activity-log" id="live-log-container">
        <!-- PERBAIKAN 2: Placeholder saat kosong -->
        <div class="log-placeholder" id="log-placeholder">
            <span>⏳</span> Menunggu aktivitas pembeli...
        </div>
    </div>

    <script>
        // --- 1. KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA'; 
        
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        const ui = {
            title: document.getElementById('status-title'),
            desc: document.getElementById('status-desc'),
            spinner: document.getElementById('main-spinner'),
            btnGoogle: document.getElementById('btn-google'),
            errorBox: document.getElementById('error-box'),
            errorMsg: document.getElementById('error-msg')
        };

        // --- 2. FUNGSI LOGIN GOOGLE ---
        async function handleGoogleLogin() {
            const originalText = ui.btnGoogle.innerHTML;
            ui.btnGoogle.disabled = true;
            ui.btnGoogle.innerHTML = `<svg class="spin-anim" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 12a9 9 0 1 1-6 2.3l-4-4"></path></svg> Menghubungkan...`;

            try {
                const { data, error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.href 
                    }
                });
                if (error) throw error;
            } catch (err) {
                console.error(err);
                ui.title.innerText = "Gagal";
                ui.desc.innerText = err.message;
                ui.errorBox.style.display = 'block';
                ui.errorMsg.innerText = err.message;
                ui.btnGoogle.disabled = false;
                ui.btnGoogle.innerHTML = originalText;
            }
        }

        // --- 3. LOGIKA UTAMA ---
        async function checkSession() {
            try {
                const { data: { session }, error: sessionError } = await sb.auth.getSession();
                if (sessionError) throw sessionError;

                if (session) {
                    console.log("✅ Login Terdeteksi.");
                    ui.title.innerText = "Verifikasi Akun...";
                    ui.spinner.style.borderTopColor = "var(--luxury-gold)";

                    const { data: userData, error: fetchError } = await sb
                        .from('ngebelusers') 
                        .select('role') 
                        .eq('id', session.user.id)
                        .maybeSingle(); 

                    if (fetchError && fetchError.code !== 'PGRST116') {
                        throw fetchError;
                    }

                    if (!userData) {
                        ui.title.innerText = "Akun Baru";
                        ui.desc.innerText = "Mengarahkan ke pendaftaran...";
                        setTimeout(() => { window.location.href = 'signup.html'; }, 1500);
                        return;
                    }

                    localStorage.setItem('aurora_user', JSON.stringify(session.user));
                    localStorage.setItem('aurora_role', userData.role || 'user');

                    if (userData.role === 'admin') {
                        ui.title.innerText = "Admin Terdeteksi";
                        setTimeout(() => { window.location.href = 'admin.html'; }, 1500);
                    } else {
                        ui.title.innerText = "Selamat Datang";
                        ui.spinner.style.borderTopColor = "#10b981";
                        setTimeout(() => { window.location.href = 'store.html'; }, 1500);
                    }

                } else {
                    console.log("ℹ️ Belum login.");
                    // Perubahan: Hapus subtitle default yang mengganggu
                    ui.title.innerText = "Aurorra"; 
                    ui.desc.innerText = ""; 
                    ui.spinner.style.display = 'none';
                    document.querySelector('.pi-icon').style.display = 'none';
                    ui.btnGoogle.style.display = 'flex';
                }

            } catch (err) {
                console.error(err);
                ui.title.innerText = "Error Sistem";
                ui.desc.innerText = err.message;
                ui.errorBox.style.display = 'block';
                ui.errorMsg.innerText = err.message;
                ui.spinner.style.display = 'none';
                document.querySelector('.pi-icon').style.display = 'none';
                ui.btnGoogle.style.display = 'flex';
            }
        }

        // --- 4. ANALYTICS TRACKER ---
        async function trackPageView() {
            try {
                await sb.from('page_views').insert([{
                    page_url: window.location.pathname,
                    user_agent: navigator.userAgent
                }]);
                console.log("📊 Analytics tracked");
            } catch (e) { console.warn("Analytics error:", e.message); }
        }

        // --- 5. LIVE ACTIVITY LOG ---
        const dummyUsers = ["Anisa", "Budi", "Citra", "Dimas", "Eka", "Fajar", "Gita", "Hadi", "Irma", "Joko", "Kiki", "Lina", "Maya", "Nadia", "Oscar", "Putri", "Qori", "Rina", "Sari", "Tomi", "Umi", "Vina", "Wawan", "Xena", "Yudi", "Zahra", "Arif", "Bella", "Chika", "Danu", "Elsa", "Farhan", "Gisela", "Hendra", "Ina", "Jihan", "Karlina", "Leo", "Mira", "Nino", "Oline", "Pandu", "Quincy", "Rendi", "Sinta", "Tasya", "Ucok", "Vera", "Winda", "Yoga"];
        const dummyProducts = ["Aurorra Rouge", "Mystic Night", "Royal Oud", "Velvet Rose", "Ocean Breeze", "Golden Sunset", "Midnight Noir", "Cherry Blossom", "Amber Musk", "Fresh Citrus", "Dark Desire", "Pure White", "Blue Ocean", "Pink Paradise", "Silver Rain"];
        const placeholder = document.getElementById('log-placeholder');

        function showRandomActivity() {
            const container = document.getElementById('live-log-container');
            
            // Sembunyikan placeholder saat ada log
            if(placeholder) placeholder.style.display = 'none';

            const name = dummyUsers[Math.floor(Math.random() * dummyUsers.length)];
            const product = dummyProducts[Math.floor(Math.random() * dummyProducts.length)];
            const time = Math.floor(Math.random() * 5) + 1;

            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `
                <div class="log-icon">🛍️</div>
                <div class="log-content">
                    <span class="log-name">${name}</span>
                    <span class="log-action">Membeli ${product}</span>
                    <span class="log-time">${time} menit yang lalu</span>
                </div>
            `;

            container.prepend(logItem); 

            setTimeout(() => { logItem.classList.add('show'); }, 50);

            setTimeout(() => {
                logItem.classList.remove('show');
                logItem.classList.add('fade-out');
                setTimeout(() => {
                    logItem.remove();
                    // Tampilkan placeholder lagi jika container kosong
                    // Note: log placeholder akan muncul kembali dengan animasi fadeInOut
                    if(container.querySelectorAll('.log-item').length === 0 && placeholder) {
                        placeholder.style.display = 'flex';
                    }
                }, 500);
            }, 4000);
        }

        // --- INITIALIZATION ---
        window.onload = function() {
            checkSession();
            trackPageView();
            
            // Jadwal log muncul
            setTimeout(showRandomActivity, 2000); // Muncul pertama setelah 2 detik
            setInterval(showRandomActivity, 8000); // Lanjut setiap 8 detik
        };
    </script>
</body>
</html>

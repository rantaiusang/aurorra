<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terima Kasih - Aurorra Store</title>
    
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES --- */
        :root {
            --luxury-gold: #d4af37;
            --luxury-gold-light: #f3e5ab;
            --dark-bg: #0f0c15;
            --card-bg: #161216;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 5%;
        }

        .thankyou-wrapper {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        .success-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease forwards;
        }

        .big-check {
            font-size: 5rem;
            color: #4CAF50;
            margin-bottom: 20px;
            display: inline-block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--luxury-gold);
            margin: 0 0 10px 0;
        }

        .order-number {
            color: var(--luxury-gold);
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-family: monospace;
            background: rgba(212, 175, 55, 0.1);
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block;
        }

        .invoice-card {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease forwards 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }

        .invoice-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
            color: #fff;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            align-items: center;
        }

        .detail-label { color: #aaa; }
        .detail-value { color: #fff; text-align: right; font-weight: 500; word-break: break-word; }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,255,255,0.1);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .total-price { color: var(--luxury-gold); }

        .tracking-section {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 40px;
            animation: slideUp 0.8s ease forwards 0.5s;
            opacity: 0;
            transform: translateY(20px);
        }

        .resi-input {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 6px;
            text-align: center;
            margin: 15px 0;
            font-family: monospace;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        .btn-track {
            background: var(--luxury-gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-track:hover { background: #ffed4a; transform: scale(1.05); }
        .btn-track:disabled { background: #555; cursor: wait; }
        
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 10px;
            font-weight: 600;
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .home-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: 600;
        }
        .home-btn:hover { background: rgba(255,255,255,0.1); }

        /* Error State Styles */
        .error-state { color: #ff4d4d; }
        .error-state .big-check { color: #ff4d4d; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }

        @media (max-width: 600px) {
            body { padding: 20px 5%; }
            h1 { font-size: 2rem; }
            .detail-value { max-width: 60%; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="thankyou-wrapper">
        
        <!-- Header Sukses -->
        <div class="success-header" id="mainHeader">
            <div class="big-check">✅</div>
            <h1>Terima Kasih!</h1>
            <p class="order-number" id="orderNumber">Memverifikasi Keamanan...</p>
            <p style="color: #888;">Pesanan Anda sedang diproses.</p>
        </div>

        <!-- Kartu Invoice -->
        <div class="invoice-card">
            <div class="invoice-title">Detail Pesanan</div>
            
            <div class="detail-row">
                <span class="detail-label">Nama Penerima</span>
                <span class="detail-value" id="custName">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">No. Telepon</span>
                <span class="detail-value" id="custPhone">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Alamat</span>
                <span class="detail-value" id="custAddress" style="max-width: 60%; text-align: right;">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Metode Pembayaran</span>
                <span class="detail-value" style="color: var(--luxury-gold);" id="payMethod">-</span>
            </div>
            
            <div class="detail-row" style="margin-top: 20px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); flex-direction: column; align-items: flex-start;">
                <span class="detail-label">Barang</span>
                <span class="detail-value" id="itemName" style="text-align: left; color: #ccc; font-weight: 400; font-size: 0.9rem; margin-top: 5px;">-</span>
            </div>

            <div class="total-row">
                <span>Total Bayar</span>
                <span class="total-price" id="totalPaid">Rp 0</span>
            </div>
        </div>

        <!-- Bagian Cek Resi -->
        <div class="tracking-section">
            <h3 style="color: #fff; margin-bottom: 5px;">Lacak Pengiriman</h3>
            <p style="font-size: 0.9rem; color: #aaa;">Klik tombol di bawah untuk mengecek status terbaru pengiriman.</p>
            
            <input type="text" id="resiInput" class="resi-input" placeholder="Nomor Resi" readonly>
            
            <button class="btn-track" id="btnTrack" onclick="checkResi()">Cek Status</button>
            
            <div id="trackingResult" style="display: none; margin-top: 20px; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <div class="status-badge" id="trackingBadge">-</div>
                <p style="color: #ccc; font-size: 0.9rem; margin-top: 5px;" id="trackingDesc">-</p>
            </div>
        </div>

        <a href="store.html" class="home-btn">Kembali ke Store</a>

    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // --- KONFIGURASI ---
        const SUPABASE_URL = 'https://dikapquhusbwjccbqcsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA';
        const CHECK_FUNCTION = "/functions/v1/check-payment";
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentOrderId = null;
        let currentUserSession = null;

        window.onload = async function() {
            await initPage();
        };

        // 1. INISIALISASI
        async function initPage() {
            // A. Cek Sesi Login Dulu (Keamanan Layer 1)
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            
            if (sessionError || !session) {
                showError("Sesi Habis", "Silakan login kembali untuk melihat detail pesanan.", true);
                return;
            }
            currentUserSession = session;

            // B. Ambil Order ID dari URL
            const urlParams = new URLSearchParams(window.location.search);
            currentOrderId = urlParams.get('order_id') || urlParams.get('client_id');

            if (currentOrderId) {
                document.getElementById('orderNumber').innerText = `Order ID: ${currentOrderId}`;
                await verifyAndLoadSecureData(currentOrderId);
            } else {
                // Fallback: Coba cari order terakhir user via API jika tidak ada ID di URL
                await loadLatestOrderFallback();
            }
        }

        // 2. VERIFIKASI & LOAD DATA (SECURE)
        async function verifyAndLoadSecureData(orderId) {
            try {
                // Step A: Verifikasi status pembayaran via Endpoint Public/Secure
                const resCheck = await fetch(`${SUPABASE_URL}${CHECK_FUNCTION}?invoice=${orderId}`);
                const resultCheck = await resCheck.json();

                // Step B: Jika Pembayaran Sukses, Ambil Detail via Secure Endpoint (get-user-orders)
                if (resCheck.ok && resultCheck.transaction && resultCheck.transaction.status === 'PAYMENT_SUCCESS') {
                    await loadUserOrderDetails(orderId);
                    
                    // Bersihkan data sementara
                    localStorage.removeItem('aurora_cart');
                    localStorage.removeItem('temp_order_data');
                    localStorage.removeItem('aurora_pending_order');
                } else {
                    // Jika pembayaran belum sukses
                    document.getElementById('orderNumber').innerText = "Menunggu Pembayaran";
                    document.getElementById('custName').innerText = "Status: " + (resultCheck.transaction ? resultCheck.transaction.status : "PENDING");
                    document.querySelector('.big-check').innerText = "⏳";
                    document.querySelector('.big-check').style.color = "#ffa500";
                    document.querySelector('h1').innerText = "Menunggu Konfirmasi";
                }
            } catch (error) {
                console.error("Error verifikasi:", error);
                showError("Error Jaringan", "Tidak dapat terhubung ke server verifikasi.");
            }
        }

        // 3. FUNGSI AMAN: Ambil Detail via Edge Function
        async function loadUserOrderDetails(orderId) {
            try {
                // Panggil Edge Function 'get-user-orders' dengan Authorization Header
                const response = await fetch(`${SUPABASE_URL}/functions/v1/get-user-orders`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${currentUserSession.access_token}`
                        // API Key tidak wajib jika Edge Function sudah di-set public tapi mengecek token internal
                    }
                });

                if (!response.ok) throw new Error("Gagal mengambil data order.");

                const result = await response.json();
                
                // Cari order spesifik dari daftar order user (user hanya bisa akses miliknya)
                const orderData = result.orders ? result.orders.find(o => o.order_id === orderId) : null;

                if (orderData) {
                    populateUI(orderData);
                } else {
                    // Jika order ID ada di URL tapi TIDAK ADA di list order user -> ORANG LAIN
                    showError("Akses Ditolak", "Order ini bukan milik akun Anda atau tidak ditemukan.");
                }

            } catch (err) {
                console.error("Gagal load detail aman:", err);
                showError("Error Data", "Gagal memuat detail pesanan.");
            }
        }

        // 3b. FALLBACK: Jika tidak ada order_id di URL
        async function loadLatestOrderFallback() {
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/get-user-orders`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${currentUserSession.access_token}`
                    }
                });

                const result = await response.json();
                
                if (result.orders && result.orders.length > 0) {
                    // Ambil order terbaru (misal index 0 sudah terurut descending)
                    const latestOrder = result.orders[0];
                    currentOrderId = latestOrder.order_id;
                    
                    // Update URL tanpa reload (UX lebih mulus)
                    window.history.replaceState({}, "", `?order_id=${currentOrderId}`);
                    document.getElementById('orderNumber').innerText = `Order ID: ${currentOrderId}`;
                    
                    populateUI(latestOrder);
                } else {
                    showError("Tidak Ada Pesanan", "Anda belum memiliki riwayat pesanan.");
                }
            } catch (err) {
                console.error(err);
                showError("Error", "Gagal memuat data pesanan.");
            }
        }

        // 4. POPULATE UI (Dengan Safety Checks)
        function populateUI(data) {
            document.getElementById('custName').innerText = data.customer_name || "-";
            document.getElementById('custPhone').innerText = data.customer_phone || "-";
            document.getElementById('custAddress').innerText = data.customer_address || "-";
            document.getElementById('totalPaid').innerText = formatPrice(data.total_amount || 0);
            document.getElementById('payMethod').innerText = data.payment_method || "DOKU";

            // Render Items dengan proteksi
            let itemsHtml = "";
            let items = Array.isArray(data.items) ? data.items : [];
            
            if (items.length > 0) {
                items.forEach(item => {
                    itemsHtml += `${item.name || "-"} (x${item.qty || 1})<br>`;
                });
            } else {
                itemsHtml = "Tidak ada detail item";
            }
            document.getElementById('itemName').innerHTML = itemsHtml;
            
            // Isi resi jika ada
            if(data.tracking_number) {
                document.getElementById('resiInput').value = data.tracking_number;
            }
        }

        // 5. CEK RESI (Masih aman pakai session)
        async function checkResi() {
            if(!currentOrderId || !currentUserSession) return;

            const btn = document.getElementById('btnTrack');
            const resultDiv = document.getElementById('trackingResult');
            const badge = document.getElementById('trackingBadge');
            const desc = document.getElementById('trackingDesc');
            const resiInput = document.getElementById('resiInput');

            btn.disabled = true;
            btn.innerText = "Mengecek...";

            try {
                // Gunakan kembali Secure Endpoint untuk konsistensi, 
                // atau buat endpoint baru 'get-order-status' jika ingin lebih ringan.
                // Disini kita pakai ulang get-user-orders untuk amannya.
                const response = await fetch(`${SUPABASE_URL}/functions/v1/get-user-orders`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${currentUserSession.access_token}`
                    }
                });
                const result = await response.json();
                const data = result.orders ? result.orders.find(o => o.order_id === currentOrderId) : null;

                if (data) {
                    resiInput.value = data.tracking_number || "Belum Ada";
                    
                    if (data.status === 'shipped' && data.tracking_number) {
                        badge.innerText = "Sedang Dikirim";
                        badge.style.background = 'rgba(76, 175, 80, 0.2)'; badge.style.color = '#4CAF50';
                        desc.innerText = `Nomor resi ${data.tracking_number} sudah terdaftar.`;
                    } else if (data.status === 'delivered') {
                        badge.innerText = "Selesai"; desc.innerText = "Paket telah diterima.";
                    } else {
                        badge.innerText = "Sedang Diproses";
                        badge.style.background = 'rgba(255, 165, 0, 0.2)'; badge.style.color = '#FFA500';
                        desc.innerText = "Pesanan sedang dikemas oleh admin.";
                    }
                    resultDiv.style.display = 'block';
                } else {
                    alert("Data tidak ditemukan atau akses ditolak.");
                }
            } catch (err) {
                console.error(err);
                alert("Gagal cek status.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Cek Status";
            }
        }

        // Helper Functions
        function formatPrice(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function showError(title, msg, redirectToLogin = false) {
            const header = document.getElementById('mainHeader');
            header.classList.add('error-state');
            header.querySelector('.big-check').innerText = "⚠️";
            header.querySelector('h1').innerText = title;
            document.getElementById('orderNumber').innerText = "";
            header.querySelector('p:nth-child(4)').innerText = msg; // Select subtitle
            
            // Sembunyikan kartu invoice & tracking
            document.querySelector('.invoice-card').style.display = 'none';
            document.querySelector('.tracking-section').style.display = 'none';

            if(redirectToLogin) {
                setTimeout(() => { window.location.href = 'login.html'; }, 3000);
            }
        }
    </script>
</body>
</html>
